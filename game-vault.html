<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Vault — Moved</title>
<meta http-equiv="refresh" content="5;url=https://heyitsheart.github.io/game-vault/">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:#06040f;font-family:'DM Sans',sans-serif;color:#e9e0ff;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(124,58,237,0.1) 0%,transparent 70%);pointer-events:none;}

.box{position:relative;z-index:1;text-align:center;max-width:520px;width:100%;}
.icon{font-size:56px;margin-bottom:20px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:#7c3aed;margin-bottom:14px;}
h1{font-family:'Playfair Display',serif;font-size:clamp(32px,6vw,52px);font-weight:900;line-height:1;color:#f5f0ff;margin-bottom:14px;}
h1 em{font-style:italic;background:linear-gradient(135deg,#c4b5fd,#a78bfa,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
p{font-size:15px;color:rgba(196,181,253,0.5);line-height:1.7;margin-bottom:32px;font-weight:300;}
p strong{color:rgba(196,181,253,0.8);}
.new-url{display:block;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#a78bfa;background:rgba(124,58,237,0.08);border:1px solid rgba(124,58,237,0.2);border-radius:10px;padding:14px 20px;margin-bottom:28px;word-break:break-all;}
.btn{display:inline-flex;align-items:center;gap:10px;padding:14px 32px;background:linear-gradient(135deg,#7c3aed,#9333ea);border:none;border-radius:11px;color:#fff;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;text-decoration:none;box-shadow:0 8px 32px rgba(124,58,237,0.4);transition:transform 0.15s,box-shadow 0.15s;cursor:pointer;}
.btn:hover{transform:translateY(-2px);box-shadow:0 14px 44px rgba(124,58,237,0.55);}
.countdown{margin-top:20px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(196,181,253,0.25);letter-spacing:0.05em;}
.countdown span{color:rgba(196,181,253,0.5);}
</style>
</head>
<body>
<div class="box">
  <div class="icon">🎮</div>
  <div class="eyebrow">We've moved</div>
  <h1>Game Vault has a<br><em>new home.</em></h1>
  <p>The bookmark you have is old. Game Vault now lives at its permanent address — <strong>update your bookmark!</strong></p>
  <div class="new-url">heyitsheart.github.io/game-vault/</div>
  <a class="btn" href="https://heyitsheart.github.io/game-vault.html">Take me there →</a>
  <div class="countdown">Redirecting automatically in <span id="t">5</span>s…</div>
</div>
<script>
var n=5;var el=document.getElementById('t');
var iv=setInterval(function(){n--;el.textContent=n;if(n<=0){clearInterval(iv);window.location.href='https://heyitsheart.github.io/game-vault/';}},1000);
</script>
</body>
</html>
