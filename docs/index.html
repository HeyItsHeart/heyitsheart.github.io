<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Starshine — Documentation</title>
<style>
/* ── Reset & Base ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #09090f;
  --surface:  #111118;
  --surface2: #16161f;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --text:     #e8e6de;
  --muted:    #7a7870;
  --muted2:   #555450;
  --purple:   #a07aff;
  --purple-dk:#7c5cfa;
  --teal:     #4ecfb3;
  --amber:    #f0a832;
  --coral:    #ff7a50;
  --blue:     #5a8eff;
  --green:    #50c878;
  --luma:     #ff7a50;
  --delfino:  #4fc3f7;
  --constel:  #a07aff;
  --wonder:   #50c878;
  --nav-w:    260px;
  --header-h: 52px;
  font-size: 15px;
}
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  line-height: 1.65;
  min-height: 100vh;
}

/* ── Scrollbar ────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

/* ── Top header ───────────────────────────────────────────────── */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  background: rgba(9,9,15,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 0;
  z-index: 200; padding: 0 20px;
}
.topbar-logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text);
  text-decoration: none; margin-right: auto;
}
.topbar-logo .star { color: var(--purple); font-size: 18px; }
.topbar-logo em { color: var(--purple); font-style: normal; }
.topbar-logo small { font-size: 9px; letter-spacing: 3px; color: var(--muted);
  font-weight: 400; text-transform: uppercase; margin-left: 2px; }

.topbar-actions {
  display: flex; align-items: center; gap: 10px;
}
.btn-pdf {
  display: flex; align-items: center; gap: 6px;
  background: var(--purple-dk); color: #fff;
  border: none; border-radius: 7px; padding: 7px 14px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  text-decoration: none; transition: opacity 0.15s;
  letter-spacing: 0.3px;
}
.btn-pdf:hover { opacity: 0.85; }
.btn-pdf svg { width: 13px; height: 13px; flex-shrink: 0; }

#search-box {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 7px; padding: 6px 12px;
  color: var(--text); font-size: 13px; width: 220px;
  outline: none; transition: border-color 0.15s;
}
#search-box::placeholder { color: var(--muted); }
#search-box:focus { border-color: rgba(160,122,255,0.4); }

/* ── Side navigation ─────────────────────────────────────────── */
#sidenav {
  position: fixed; top: var(--header-h); left: 0; bottom: 0;
  width: var(--nav-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto; z-index: 100;
  padding: 16px 0 40px;
}

.nav-group { margin-bottom: 4px; }

/* Section header in nav (Luma Engine, Delfino, etc.) */
.nav-section {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px 8px 14px;
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text);
  cursor: pointer; user-select: none;
  transition: background 0.1s; border-left: 3px solid transparent;
  text-decoration: none;
}
.nav-section:hover { background: rgba(255,255,255,0.04); }
.nav-section.active { background: rgba(255,255,255,0.06); }
.nav-section .nav-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.nav-section .nav-num {
  background: rgba(255,255,255,0.08); border-radius: 4px;
  padding: 1px 6px; font-size: 9px; color: var(--muted);
  margin-left: auto; letter-spacing: 0;
}
.nav-section .chevron {
  margin-left: 4px; font-size: 9px; color: var(--muted2);
  transition: transform 0.2s; transform: rotate(0deg);
}
.nav-section.open .chevron { transform: rotate(90deg); }

/* Unit items in nav (4.1, 4.2, etc.) */
.nav-units { overflow: hidden; max-height: 0; transition: max-height 0.25s ease; }
.nav-units.open { max-height: 600px; }

.nav-unit {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 16px 5px 26px;
  font-size: 12px; color: var(--muted);
  cursor: pointer; text-decoration: none;
  transition: color 0.1s, background 0.1s;
  border-left: 3px solid transparent;
}
.nav-unit:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.nav-unit.active {
  color: var(--text);
  background: rgba(255,255,255,0.05);
}
.nav-unit .unit-num {
  font-size: 10px; color: var(--muted2); font-family: 'Courier New', monospace;
  min-width: 28px; flex-shrink: 0;
}
.nav-unit.active .unit-num { color: var(--purple); }

/* Nav section accent colors */
.nav-section[data-section="overview"]    .nav-dot { background: var(--purple); }
.nav-section[data-section="luma"]        .nav-dot { background: var(--luma); }
.nav-section[data-section="delfino"]     .nav-dot { background: var(--delfino); }
.nav-section[data-section="constellation"].nav-dot { background: var(--constel); }
.nav-section[data-section="wondermod"]   .nav-dot { background: var(--wonder); }
.nav-section[data-section="renderer"]    .nav-dot { background: var(--blue); }
.nav-section[data-section="roadmap"]     .nav-dot { background: var(--muted); }

/* Nav section active borders */
.nav-section[data-section="overview"].active    { border-left-color: var(--purple); }
.nav-section[data-section="luma"].active        { border-left-color: var(--luma); }
.nav-section[data-section="delfino"].active     { border-left-color: var(--delfino); }
.nav-section[data-section="constellation"].active { border-left-color: var(--constel); }
.nav-section[data-section="wondermod"].active   { border-left-color: var(--wonder); }
.nav-section[data-section="renderer"].active    { border-left-color: var(--blue); }
.nav-section[data-section="roadmap"].active     { border-left-color: var(--muted); }

/* ── Main content ────────────────────────────────────────────── */
#content {
  margin-left: var(--nav-w);
  padding-top: calc(var(--header-h) + 40px);
  padding-bottom: 80px;
  min-height: 100vh;
}
#content-inner {
  max-width: 820px;
  margin: 0 auto;
  padding: 0 40px;
}

/* ── Loading / PDF viewer state ──────────────────────────────── */
#loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 80px 40px; text-align: center; gap: 16px;
}
.spinner {
  width: 36px; height: 36px; border: 3px solid rgba(160,122,255,0.2);
  border-top-color: var(--purple); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-label { font-size: 13px; color: var(--muted); }

/* ── PDF drop zone ───────────────────────────────────────────── */
#drop-zone {
  border: 2px dashed rgba(160,122,255,0.3); border-radius: 14px;
  padding: 52px 32px; text-align: center; cursor: pointer;
  transition: border-color 0.2s, background 0.2s; margin: 0;
  position: relative;
}
#drop-zone input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
#drop-zone:hover, #drop-zone.drag-over {
  border-color: rgba(160,122,255,0.6); background: rgba(160,122,255,0.04);
}
.drop-icon { font-size: 36px; margin-bottom: 12px; }
.drop-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.drop-hint { font-size: 13px; color: var(--muted); }
.drop-hint strong { color: var(--purple); }
.drop-hint-sub { font-size: 11px; color: var(--muted2); margin-top: 6px; }

/* ── Section banner ──────────────────────────────────────────── */
.section-banner {
  border-radius: 10px; padding: 20px 24px;
  margin: 36px 0 20px;
  display: flex; align-items: flex-start; gap: 18px;
  scroll-margin-top: calc(var(--header-h) + 24px);
}
.section-banner-num {
  font-size: 28px; font-weight: 800; opacity: 0.25;
  line-height: 1; min-width: 36px; flex-shrink: 0;
}
.section-banner-body { flex: 1; min-width: 0; }
.section-banner-title {
  font-size: 22px; font-weight: 700; line-height: 1.2; margin-bottom: 4px;
}
.section-banner-sub {
  font-size: 12px; opacity: 0.6; letter-spacing: 0.5px;
}

/* Section color themes */
.section-banner.overview    { background: rgba(160,122,255,0.10); border: 1px solid rgba(160,122,255,0.2); }
.section-banner.overview    .section-banner-num { color: var(--purple); }
.section-banner.luma        { background: rgba(255,122,80,0.10); border: 1px solid rgba(255,122,80,0.2); }
.section-banner.luma        .section-banner-num { color: var(--luma); }
.section-banner.delfino     { background: rgba(79,195,247,0.10); border: 1px solid rgba(79,195,247,0.2); }
.section-banner.delfino     .section-banner-num { color: var(--delfino); }
.section-banner.constellation { background: rgba(160,122,255,0.10); border: 1px solid rgba(160,122,255,0.2); }
.section-banner.constellation .section-banner-num { color: var(--constel); }
.section-banner.wondermod   { background: rgba(80,200,120,0.10); border: 1px solid rgba(80,200,120,0.2); }
.section-banner.wondermod   .section-banner-num { color: var(--wonder); }
.section-banner.renderer    { background: rgba(90,142,255,0.10); border: 1px solid rgba(90,142,255,0.2); }
.section-banner.renderer    .section-banner-num { color: var(--blue); }
.section-banner.roadmap     { background: rgba(122,120,112,0.10); border: 1px solid rgba(122,120,112,0.2); }
.section-banner.roadmap     .section-banner-num { color: var(--muted); }

/* ── Unit header ─────────────────────────────────────────────── */
.unit-header {
  display: flex; align-items: center; gap: 10px;
  margin: 28px 0 12px;
  scroll-margin-top: calc(var(--header-h) + 20px);
}
.unit-num-badge {
  font-size: 10px; font-weight: 700; padding: 3px 8px;
  border-radius: 5px; font-family: 'Courier New', monospace;
  flex-shrink: 0; letter-spacing: 0.3px;
}
.unit-title { font-size: 16px; font-weight: 700; color: var(--text); }

/* Unit badge colors per section */
[data-section="overview"]     .unit-num-badge { background: rgba(160,122,255,0.2); color: var(--purple); }
[data-section="luma"]         .unit-num-badge { background: rgba(255,122,80,0.2);  color: var(--luma); }
[data-section="delfino"]      .unit-num-badge { background: rgba(79,195,247,0.2);  color: var(--delfino); }
[data-section="constellation"].unit-num-badge { background: rgba(160,122,255,0.2); color: var(--constel); }
[data-section="wondermod"]    .unit-num-badge { background: rgba(80,200,120,0.2);  color: var(--wonder); }
[data-section="renderer"]     .unit-num-badge { background: rgba(90,142,255,0.2);  color: var(--blue); }
[data-section="roadmap"]      .unit-num-badge { background: rgba(122,120,112,0.2); color: var(--muted); }

/* ── Sub-heading ─────────────────────────────────────────────── */
.sub-head {
  font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--purple); margin: 18px 0 8px;
}

/* ── Body text ───────────────────────────────────────────────── */
.body-text {
  font-size: 14px; color: rgba(232,230,222,0.85); line-height: 1.75;
  margin-bottom: 14px;
}

/* ── Code block ──────────────────────────────────────────────── */
.code-block {
  background: #0d0d1a; border: 1px solid rgba(90,142,255,0.15);
  border-radius: 8px; padding: 14px 16px; margin: 10px 0 14px;
  font-family: 'Courier New', 'Cascadia Code', monospace;
  font-size: 12px; line-height: 1.65;
  color: #c0d8ff; overflow-x: auto;
  white-space: pre;
}

/* ── Tables ──────────────────────────────────────────────────── */
.doc-table {
  width: 100%; border-collapse: collapse;
  font-size: 13px; margin: 10px 0 18px;
  overflow: hidden; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.07);
}
.doc-table thead { background: #1a1a2e; }
.doc-table th {
  text-align: left; padding: 9px 12px;
  font-size: 12px; font-weight: 700; color: var(--text);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.doc-table td {
  padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.04);
  color: rgba(232,230,222,0.8); vertical-align: top;
}
.doc-table tr:last-child td { border-bottom: none; }
.doc-table tr:nth-child(odd)  td { background: rgba(15,15,26,0.6); }
.doc-table tr:nth-child(even) td { background: rgba(19,19,31,0.6); }
.doc-table code { font-family: 'Courier New', monospace; font-size: 11.5px;
  color: #9ab8f0; background: rgba(90,142,255,0.1);
  padding: 1px 5px; border-radius: 3px; }

/* Status badges in tables */
.status { display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600; padding: 2px 8px;
  border-radius: 4px; white-space: nowrap; }
.status.done    { background: rgba(80,200,120,0.15); color: #50c878; }
.status.partial { background: rgba(240,168,50,0.15); color: #f0a832; }
.status.stub    { background: rgba(240,96,80,0.15);  color: #f06050; }
.status.planned { background: rgba(160,122,255,0.15);color: #a07aff; }
.status.shared  { background: rgba(79,195,247,0.15); color: #4fc3f7; }

/* ── Divider ─────────────────────────────────────────────────── */
.hr { height: 1px; background: var(--border); margin: 32px 0; }

/* ── Progress bar (roadmap) ──────────────────────────────────── */
.version-block {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 20px; margin: 8px 0;
}
.version-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  color: var(--purple); text-transform: uppercase; margin-bottom: 4px;
}
.version-focus { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.version-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }

/* ── Search highlight ────────────────────────────────────────── */
mark { background: rgba(160,122,255,0.3); color: inherit; border-radius: 2px; }

/* ── PDF notice bar ──────────────────────────────────────────── */
#pdf-notice {
  background: rgba(160,122,255,0.08); border: 1px solid rgba(160,122,255,0.2);
  border-radius: 8px; padding: 12px 16px; margin-bottom: 24px;
  font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 10px;
}
#pdf-notice strong { color: var(--purple); }

/* ── Responsive ──────────────────────────────────────────────── */
@media (max-width: 800px) {
  :root { --nav-w: 0px; }
  #sidenav { transform: translateX(-260px); transition: transform 0.25s; width: 260px; }
  #sidenav.open { transform: translateX(0); }
  #content { margin-left: 0; }
  #content-inner { padding: 0 20px; }
  #menu-toggle { display: flex !important; }
}
#menu-toggle {
  display: none; align-items: center; justify-content: center;
  width: 36px; height: 36px; border: 1px solid var(--border2);
  border-radius: 7px; background: transparent; cursor: pointer;
  color: var(--text); margin-right: 8px;
}
</style>
</head>
<body>

<!-- Top bar -->
<header id="topbar">
  <button id="menu-toggle" aria-label="Toggle nav">
    <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
      <rect y="0" width="16" height="1.5" rx="0.75" fill="currentColor"/>
      <rect y="5.25" width="16" height="1.5" rx="0.75" fill="currentColor"/>
      <rect y="10.5" width="16" height="1.5" rx="0.75" fill="currentColor"/>
    </svg>
  </button>
  <a class="topbar-logo" href="#">
    <span class="star">★</span>
    <div>
      <div>PROJECT <em>STARSHINE</em></div>
      <small>Technical Documentation</small>
    </div>
  </a>
  <div class="topbar-actions">
    <input type="search" id="search-box" placeholder="Search docs…" autocomplete="off" />
    <a class="btn-pdf" id="pdf-link" href="#" download="project-starshine-docs.pdf">
      <svg viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 10.5L4.5 7H7V2h2v5h2.5L8 10.5z"/>
        <path d="M2 12h12v2H2z"/>
      </svg>
      Download PDF
    </a>
  </div>
</header>

<!-- Side navigation (built dynamically) -->
<nav id="sidenav"></nav>

<!-- Main content -->
<main id="content">
  <div id="content-inner">
    <!-- Upload zone shown initially if no PDF is loaded -->
    <div id="drop-zone">
      <input type="file" id="pdf-file-input" accept=".pdf" />
      <div class="drop-icon">📄</div>
      <div class="drop-title">Load the Starshine documentation PDF</div>
      <div class="drop-hint">Drop <strong>project-starshine-docs.pdf</strong> here, or click to browse</div>
      <div class="drop-hint-sub">The PDF is parsed locally — nothing is uploaded</div>
    </div>

    <div id="loading" style="display:none">
      <div class="spinner"></div>
      <div class="loading-label" id="loading-label">Parsing PDF…</div>
    </div>

    <div id="doc-content" style="display:none"></div>
  </div>
</main>

<!-- PDF.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
// ── Config ────────────────────────────────────────────────────────
const PDFJS_WORKER = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER;

// ── Section metadata ──────────────────────────────────────────────
const SECTION_META = {
  '1': { key: 'overview',       label: 'Overview & Architecture', color: '#a07aff' },
  '2': { key: 'luma',           label: 'Luma Engine',             color: '#ff7a50' },
  '3': { key: 'delfino',        label: 'Delfino Engine',          color: '#4fc3f7' },
  '4': { key: 'constellation',  label: 'Constellation Engine',    color: '#a07aff' },
  '5': { key: 'wondermod',      label: 'WonderMod Framework',     color: '#50c878' },
  '6': { key: 'renderer',       label: 'Renderer',                color: '#5a8eff' },
  '7': { key: 'roadmap',        label: 'Project Roadmap',         color: '#7a7870' },
};

// Detect if number is a section (e.g. "1", "2") vs unit (e.g. "1.1", "2.3")
function classifyHeading(num) {
  if (!num) return null;
  const parts = num.split('.');
  if (parts.length === 1 && /^\d+$/.test(parts[0])) return 'section';
  if (parts.length === 2) return 'unit';
  if (parts.length >= 3) return 'sub';
  return null;
}

function getSectionNum(num) {
  return num ? num.split('.')[0] : '';
}

// ── PDF Loading ───────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('pdf-file-input');
const loading   = document.getElementById('loading');
const loadingLabel = document.getElementById('loading-label');
const docContent= document.getElementById('doc-content');

// Try to auto-load if a PDF was provided via URL param
const urlParam = new URLSearchParams(location.search).get('pdf');
if (urlParam) loadPDFFromURL(urlParam);

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.name.endsWith('.pdf')) loadPDFFromFile(f);
});
fileInput.addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) loadPDFFromFile(f);
});

async function loadPDFFromFile(file) {
  const url = URL.createObjectURL(file);
  document.getElementById('pdf-link').href = url;
  document.getElementById('pdf-link').download = file.name;
  await parsePDF(url);
}
async function loadPDFFromURL(url) {
  document.getElementById('pdf-link').href = url;
  await parsePDF(url);
}

// ── PDF Text Extraction ───────────────────────────────────────────
async function parsePDF(url) {
  dropZone.style.display = 'none';
  loading.style.display  = 'flex';

  try {
    loadingLabel.textContent = 'Loading PDF…';
    const pdf = await pdfjsLib.getDocument(url).promise;
    const totalPages = pdf.numPages;
    const allLines = [];

    for (let p = 1; p <= totalPages; p++) {
      loadingLabel.textContent = `Extracting text… page ${p}/${totalPages}`;
      const page = await pdf.getPage(p);
      const content = await page.getTextContent();

      // Group items by Y position (same line = within 3px)
      const lineMap = new Map();
      for (const item of content.items) {
        if (!item.str?.trim()) continue;
        const y = Math.round(item.transform[5] / 3) * 3;
        if (!lineMap.has(y)) lineMap.set(y, []);
        lineMap.get(y).push({ str: item.str, x: item.transform[4], fontSize: item.height });
      }

      // Sort lines top-to-bottom (descending Y in PDF coords)
      const sortedY = [...lineMap.keys()].sort((a, b) => b - a);
      for (const y of sortedY) {
        const items = lineMap.get(y).sort((a, b) => a.x - b.x);
        const text  = items.map(i => i.str).join(' ').replace(/\s+/g, ' ').trim();
        const fontSize = Math.max(...items.map(i => i.fontSize));
        if (text) allLines.push({ text, fontSize, page: p });
      }
    }

    loadingLabel.textContent = 'Parsing structure…';
    const doc = parseDocStructure(allLines);
    renderDoc(doc);

  } catch (err) {
    loading.style.display = 'none';
    dropZone.style.display = '';
    alert('Failed to parse PDF: ' + err.message);
    console.error(err);
  }
}

// ── Structure Parser ──────────────────────────────────────────────
// Detects headings by font size and numbering patterns.
// Returns a structured document object.
function parseDocStructure(lines) {
  const sections = [];
  let currentSection = null;
  let currentUnit    = null;
  let currentContent = [];

  // Compute font size stats for heading detection
  const fontSizes = lines.map(l => l.fontSize).filter(s => s > 0);
  const maxFont = Math.max(...fontSizes);
  const medFont = fontSizes.sort((a,b)=>a-b)[Math.floor(fontSizes.length*0.7)];

  function isLargHeading(line) {
    return line.fontSize > medFont * 1.5 && line.text.length < 60;
  }
  function isMedHeading(line) {
    return line.fontSize > medFont * 1.15 && line.text.length < 80;
  }

  // Numbering pattern detectors
  const RE_SECTION = /^(\d+)\s+(.+)$/;
  const RE_UNIT    = /^(\d+\.\d+)\s+(.+)$/;
  const RE_COVER   = /^(project\s+starshine|technical\s+doc|table\s+of\s+contents)/i;

  function flushContent() {
    return currentContent.splice(0);
  }

  for (const line of lines) {
    const { text } = line;

    // Skip cover page artifacts
    if (RE_COVER.test(text)) continue;
    if (/^page\s+\d+$/i.test(text)) continue;
    if (/^project\s+starshine\s*$/i.test(text)) continue;
    if (/^technical\s+doc/i.test(text)) continue;

    // Check for section heading: "2 Luma Engine"
    const secMatch = text.match(RE_SECTION);
    if (secMatch && isLargHeading(line) && SECTION_META[secMatch[1]]) {
      const num   = secMatch[1];
      const title = secMatch[2].trim();
      currentSection = {
        num, title,
        meta: SECTION_META[num],
        subtitle: '',
        units: [],
        intro: [],
      };
      currentUnit = null;
      currentContent = currentSection.intro;
      sections.push(currentSection);
      continue;
    }

    // Check for unit heading: "2.3 Class Hierarchy"
    const unitMatch = text.match(RE_UNIT);
    if (unitMatch && isMedHeading(line) && currentSection) {
      const num   = unitMatch[1];
      const title = unitMatch[2].trim();
      if (getSectionNum(num) === currentSection.num) {
        currentUnit = { num, title, blocks: [] };
        currentSection.units.push(currentUnit);
        currentContent = currentUnit.blocks;
        continue;
      }
    }

    // Accumulate content
    if (currentContent !== null) {
      currentContent.push({ text, fontSize: line.fontSize, page: line.page });
    }
  }

  return sections;
}

// ── Content Block Classifier ──────────────────────────────────────
// Given raw text lines, classify them into typed blocks:
// paragraph, code, table-row, sub-heading
function classifyBlocks(rawLines) {
  const blocks = [];
  let codeBuffer = [];
  let tableBuffer = [];
  let inCode = false;
  let paraBuffer = [];

  const CODE_CHARS = /[{}()\[\];:=<>\/\\|#@]/;
  const LOOKS_CODE = line =>
    line.fontSize < 9 &&
    (CODE_CHARS.test(line.text) || /^\s{2,}/.test(line.text) || line.text.startsWith('//'));

  function flushPara() {
    if (paraBuffer.length) {
      blocks.push({ type: 'paragraph', text: paraBuffer.map(l=>l.text).join(' ') });
      paraBuffer = [];
    }
  }
  function flushCode() {
    if (codeBuffer.length) {
      blocks.push({ type: 'code', text: codeBuffer.map(l=>l.text).join('\n') });
      codeBuffer = [];
    }
  }

  for (const line of rawLines) {
    const { text, fontSize } = line;
    if (!text.trim()) continue;

    // Sub-heading detection (e.g. "BTI Binary Layout", "TEV Stage Formula")
    if (fontSize > 10 && fontSize < 13 && text.length < 60 && /^[A-Z]/.test(text)) {
      flushPara(); flushCode();
      blocks.push({ type: 'subhead', text });
      continue;
    }

    // Code-like lines
    if (LOOKS_CODE(line)) {
      flushPara();
      codeBuffer.push(line);
      continue;
    }

    // Normal text
    flushCode();

    // Table row detection: lines with lots of column-like separators
    if (/\|/.test(text) || (text.split(/\s{3,}/).length >= 3)) {
      flushPara();
      blocks.push({ type: 'table-row', text });
      continue;
    }

    paraBuffer.push(line);
  }

  flushPara();
  flushCode();

  // Merge adjacent table-rows into tables
  const merged = [];
  for (const block of blocks) {
    if (block.type === 'table-row' && merged.length && merged[merged.length-1].type === 'table') {
      merged[merged.length-1].rows.push(block.text);
    } else if (block.type === 'table-row') {
      merged.push({ type: 'table', rows: [block.text] });
    } else {
      merged.push(block);
    }
  }
  return merged;
}

// ── Renderer ──────────────────────────────────────────────────────
function renderDoc(sections) {
  loading.style.display  = 'none';
  docContent.style.display = '';

  // Build nav
  buildNav(sections);

  // Render content
  const frag = document.createDocumentFragment();

  // PDF notice
  const notice = document.createElement('div');
  notice.id = 'pdf-notice';
  notice.innerHTML = '<strong>📄 PDF parsed</strong> — this page is generated from the Starshine documentation PDF. ' +
    'Download the PDF using the button above for the full formatted document.';
  frag.appendChild(notice);

  for (const section of sections) {
    frag.appendChild(renderSection(section));
  }

  docContent.innerHTML = '';
  docContent.appendChild(frag);

  // Set up scroll spy
  setupScrollSpy();
}

function renderSection(section) {
  const { num, title, meta, units, intro } = section;
  const el = document.createElement('div');
  el.dataset.section = meta.key;
  el.dataset.sectionNum = num;

  // Section banner
  const banner = document.createElement('div');
  banner.className = `section-banner ${meta.key}`;
  banner.id = `section-${num}`;
  banner.innerHTML = `
    <div class="section-banner-num">${num}</div>
    <div class="section-banner-body">
      <div class="section-banner-title">${escHtml(title)}</div>
      ${meta.subtitle ? `<div class="section-banner-sub">${escHtml(meta.subtitle || '')}</div>` : ''}
    </div>
  `;
  el.appendChild(banner);

  // Intro blocks
  const introBlocks = classifyBlocks(intro);
  for (const block of introBlocks) {
    el.appendChild(renderBlock(block));
  }

  // Units
  for (const unit of units) {
    el.appendChild(renderUnit(unit, meta.key));
  }

  // Divider
  const hr = document.createElement('div');
  hr.className = 'hr';
  el.appendChild(hr);

  return el;
}

function renderUnit(unit, sectionKey) {
  const { num, title, blocks } = unit;
  const el = document.createElement('div');
  el.dataset.unit = num;

  // Unit header
  const header = document.createElement('div');
  header.className = 'unit-header';
  header.id = `unit-${num.replace('.', '-')}`;
  header.dataset.section = sectionKey;
  header.innerHTML = `
    <span class="unit-num-badge">${escHtml(num)}</span>
    <span class="unit-title">${escHtml(title)}</span>
  `;
  el.appendChild(header);

  // Content blocks
  const classified = classifyBlocks(blocks);
  for (const block of classified) {
    el.appendChild(renderBlock(block));
  }

  return el;
}

function renderBlock(block) {
  switch (block.type) {
    case 'paragraph': {
      const p = document.createElement('p');
      p.className = 'body-text';
      p.textContent = block.text;
      return p;
    }
    case 'code': {
      const pre = document.createElement('pre');
      pre.className = 'code-block';
      pre.textContent = block.text;
      return pre;
    }
    case 'subhead': {
      const h = document.createElement('div');
      h.className = 'sub-head';
      h.textContent = block.text;
      return h;
    }
    case 'table': {
      return renderTable(block.rows);
    }
    default: {
      const p = document.createElement('p');
      p.className = 'body-text';
      p.textContent = block.text || '';
      return p;
    }
  }
}

function renderTable(rows) {
  const wrapper = document.createElement('div');
  wrapper.style.overflowX = 'auto';
  wrapper.style.margin = '10px 0 18px';

  const tbl = document.createElement('table');
  tbl.className = 'doc-table';

  // Heuristic: first row is header if it has fewer columns or is short
  let startRow = 0;
  if (rows.length > 1) {
    const thead = document.createElement('thead');
    const tr = document.createElement('tr');
    const cols = splitTableRow(rows[0]);
    for (const col of cols) {
      const th = document.createElement('th');
      th.textContent = col;
      tr.appendChild(th);
    }
    thead.appendChild(tr);
    tbl.appendChild(thead);
    startRow = 1;
  }

  const tbody = document.createElement('tbody');
  for (let i = startRow; i < rows.length; i++) {
    const tr = document.createElement('tr');
    const cols = splitTableRow(rows[i]);
    for (const col of cols) {
      const td = document.createElement('td');
      td.innerHTML = formatTableCell(col);
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  tbl.appendChild(tbody);
  wrapper.appendChild(tbl);
  return wrapper;
}

function splitTableRow(row) {
  // Split on 3+ spaces or pipe
  if (row.includes('|')) return row.split('|').map(s => s.trim()).filter(Boolean);
  return row.split(/\s{3,}/).map(s => s.trim()).filter(Boolean);
}

function formatTableCell(text) {
  // Status badges
  if (/^✅/.test(text) || /^implemented$/i.test(text) || /complete/i.test(text)) {
    return `<span class="status done">${escHtml(text)}</span>`;
  }
  if (/^🔶/.test(text) || /^partial/i.test(text)) {
    return `<span class="status partial">${escHtml(text)}</span>`;
  }
  if (/^⬜/.test(text) || /^stub/i.test(text)) {
    return `<span class="status stub">${escHtml(text)}</span>`;
  }
  if (/^planned$/i.test(text)) {
    return `<span class="status planned">${escHtml(text)}</span>`;
  }
  if (/^✅ shared/i.test(text)) {
    return `<span class="status shared">${escHtml(text)}</span>`;
  }
  // Code-like fields (camelCase, snake_case, or starts with m)
  if (/^m[A-Z]/.test(text) || /^[a-z][A-Za-z_]+\(/.test(text) ||
      /_/.test(text) || /^\.[a-z]{2,6}$/.test(text)) {
    return `<code>${escHtml(text)}</code>`;
  }
  return escHtml(text);
}

// ── Nav Builder ───────────────────────────────────────────────────
function buildNav(sections) {
  const nav = document.getElementById('sidenav');
  nav.innerHTML = '';

  for (const section of sections) {
    const { num, title, meta, units } = section;
    const group = document.createElement('div');
    group.className = 'nav-group';

    // Section entry
    const secEl = document.createElement('a');
    secEl.className = 'nav-section';
    secEl.dataset.section = meta.key;
    secEl.href = `#section-${num}`;
    secEl.innerHTML = `
      <span class="nav-dot"></span>
      <span style="flex:1">${escHtml(title)}</span>
      <span class="nav-num">${num}</span>
      ${units.length ? '<span class="chevron">▶</span>' : ''}
    `;
    secEl.addEventListener('click', e => {
      if (units.length) {
        e.preventDefault();
        const isOpen = secEl.classList.contains('open');
        // Close all
        document.querySelectorAll('.nav-section').forEach(s => s.classList.remove('open'));
        document.querySelectorAll('.nav-units').forEach(u => u.classList.remove('open'));
        if (!isOpen) {
          secEl.classList.add('open');
          unitsEl.classList.add('open');
        }
        // Still scroll
        document.getElementById(`section-${num}`)?.scrollIntoView({behavior:'smooth'});
      }
    });
    group.appendChild(secEl);

    // Units
    if (units.length) {
      const unitsEl = document.createElement('div');
      unitsEl.className = 'nav-units';
      for (const unit of units) {
        const uEl = document.createElement('a');
        uEl.className = 'nav-unit';
        uEl.dataset.unit = unit.num;
        uEl.href = `#unit-${unit.num.replace('.', '-')}`;
        uEl.innerHTML = `<span class="unit-num">${unit.num}</span>${escHtml(unit.title)}`;
        unitsEl.appendChild(uEl);
      }
      group.appendChild(unitsEl);

      // Auto-open first section
      if (num === '1') {
        secEl.classList.add('open');
        unitsEl.classList.add('open');
      }
    }

    nav.appendChild(group);
  }
}

// ── Scroll spy ────────────────────────────────────────────────────
function setupScrollSpy() {
  const observer = new IntersectionObserver(entries => {
    for (const entry of entries) {
      if (!entry.isIntersecting) continue;
      const id = entry.target.id;

      if (id.startsWith('section-')) {
        const num = id.replace('section-', '');
        activateSection(num);
      } else if (id.startsWith('unit-')) {
        const num = id.replace('unit-', '').replace('-', '.');
        activateUnit(num);
      }
    }
  }, { rootMargin: `-${52}px 0px -70% 0px`, threshold: 0 });

  document.querySelectorAll('[id^="section-"], [id^="unit-"]').forEach(el => {
    observer.observe(el);
  });
}

function activateSection(num) {
  document.querySelectorAll('.nav-section').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.nav-section[href="#section-${num}"]`);
  if (el) {
    el.classList.add('active');
    // Open its units
    const group = el.closest('.nav-group');
    const unitsEl = group?.querySelector('.nav-units');
    if (unitsEl && !unitsEl.classList.contains('open')) {
      document.querySelectorAll('.nav-section').forEach(s => s.classList.remove('open'));
      document.querySelectorAll('.nav-units').forEach(u => u.classList.remove('open'));
      el.classList.add('open');
      unitsEl.classList.add('open');
    }
  }
}

function activateUnit(num) {
  document.querySelectorAll('.nav-unit').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.nav-unit[data-unit="${num}"]`);
  if (el) el.classList.add('active');
}

// ── Search ────────────────────────────────────────────────────────
const searchBox = document.getElementById('search-box');
let searchTimeout;

searchBox.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(doSearch, 200);
});

function doSearch() {
  const q = searchBox.value.trim().toLowerCase();
  // Remove existing highlights
  document.querySelectorAll('mark').forEach(m => {
    m.replaceWith(m.textContent);
  });
  if (!q || q.length < 2) return;

  // Walk text nodes and highlight
  const walker = document.createTreeWalker(
    document.getElementById('doc-content'),
    NodeFilter.SHOW_TEXT,
    null
  );
  const nodes = [];
  let node;
  while (node = walker.nextNode()) nodes.push(node);

  for (const n of nodes) {
    const idx = n.textContent.toLowerCase().indexOf(q);
    if (idx === -1) continue;
    const before = document.createTextNode(n.textContent.slice(0, idx));
    const mark = document.createElement('mark');
    mark.textContent = n.textContent.slice(idx, idx + q.length);
    const after = document.createTextNode(n.textContent.slice(idx + q.length));
    n.parentNode.replaceChild(after, n);
    n.parentNode.insertBefore(mark, after);
    n.parentNode.insertBefore(before, mark);
  }

  // Scroll to first result
  const first = document.querySelector('mark');
  if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ── Mobile nav toggle ─────────────────────────────────────────────
document.getElementById('menu-toggle').addEventListener('click', () => {
  document.getElementById('sidenav').classList.toggle('open');
});

// ── Utilities ─────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

  try {
    const res = await fetch('project-starshine-docs.pdf', { method: 'HEAD' });

      await parsePDF('project-starshine-docs.pdf');
    }

  }
