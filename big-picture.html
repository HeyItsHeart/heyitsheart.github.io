<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Vault — Big Picture</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#04030a;
  --accent:#7c3aed;
  --accent2:#a855f7;
  --green:#22d3ee;
  --gold:#fbbf24;
  --red:#f43f5e;
  --text:#f0f0ff;
  --muted:rgba(240,240,255,0.45);
  --dim:rgba(240,240,255,0.18);
  --card-w:200px;
  --card-h:267px;
  --hero-accent:#7c3aed;
  --transition:0.38s cubic-bezier(0.22,1,0.36,1);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Outfit',sans-serif;color:var(--text);cursor:none;user-select:none;}
::-webkit-scrollbar{display:none;}

/* ── CURSOR ── */
#cursor{position:fixed;width:16px;height:16px;border:2px solid var(--accent2);border-radius:50%;pointer-events:none;z-index:9999;transition:transform 0.1s,border-color 0.2s;transform:translate(-50%,-50%);}
#cursor.click{transform:translate(-50%,-50%) scale(0.6);}

/* ── AMBIENT BG ── */
#ambientBg{position:fixed;inset:0;z-index:0;overflow:hidden;}
.amb-blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:0;transition:background 1.8s ease,opacity 1.8s ease;}
#blob1{width:70vw;height:70vh;top:-20%;left:-20%;background:var(--hero-accent);}
#blob2{width:50vw;height:50vh;bottom:-15%;right:-10%;background:#1e0a4a;}
#blob3{width:40vw;height:40vh;top:30%;left:40%;background:#0a0a2a;}
.amb-blob.active{opacity:0.12;}

/* ── NOISE ── */
body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}

/* ── TOP BAR ── */
#topBar{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 48px 0;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(4,3,10,0.95) 0%,transparent 100%);pointer-events:none;}
.tb-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.15em;color:var(--accent2);text-shadow:0 0 30px rgba(168,85,247,0.5);}
.tb-stats{display:flex;gap:24px;align-items:center;}
.tb-stat{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:0.05em;}
.tb-stat span{color:var(--text);font-weight:700;}
.tb-right{display:flex;align-items:center;gap:20px;}
#clock{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted);letter-spacing:0.05em;}
#clockTime{color:var(--text);font-size:15px;font-weight:700;}

/* ── MAIN SCROLL CONTAINER ── */
#main{position:fixed;inset:0;z-index:10;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;padding-bottom:120px;}
#main::-webkit-scrollbar{display:none;}

/* ── HERO ── */
#hero{position:relative;height:100vh;min-height:580px;display:flex;align-items:flex-end;overflow:hidden;}
#heroBg{position:absolute;inset:0;background-size:cover;background-position:center top;transition:opacity var(--transition),filter var(--transition);filter:saturate(0.7) brightness(0.55);}
#heroGradient{position:absolute;inset:0;background:linear-gradient(to right,rgba(4,3,10,0.98) 0%,rgba(4,3,10,0.7) 45%,rgba(4,3,10,0.1) 100%),linear-gradient(to top,rgba(4,3,10,0.98) 0%,transparent 50%);}
#heroContent{position:relative;z-index:2;padding:0 72px 80px;max-width:700px;}
#heroStatus{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent2);margin-bottom:12px;opacity:0;animation:fadeUp 0.5s 0.1s ease both;}
#heroTitle{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,7vw,96px);line-height:0.95;letter-spacing:0.02em;color:#fff;margin-bottom:16px;text-shadow:0 4px 40px rgba(0,0,0,0.8);opacity:0;animation:fadeUp 0.5s 0.15s ease both;}
#heroTags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;opacity:0;animation:fadeUp 0.5s 0.2s ease both;}
.hero-tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:4px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);letter-spacing:0.06em;text-transform:uppercase;}
#heroNotes{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:28px;max-width:480px;opacity:0;animation:fadeUp 0.5s 0.25s ease both;}
#heroActions{display:flex;gap:12px;opacity:0;animation:fadeUp 0.5s 0.3s ease both;}
.hero-btn{display:flex;align-items:center;gap:10px;padding:14px 28px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:transform 0.15s,box-shadow 0.15s;letter-spacing:0.03em;}
.hero-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 8px 32px rgba(124,58,237,0.5);}
.hero-btn.primary:hover,.hero-btn.primary.focused{transform:translateY(-2px);box-shadow:0 14px 44px rgba(124,58,237,0.65);}
.hero-btn.secondary{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.18);backdrop-filter:blur(10px);}
.hero-btn.secondary:hover,.hero-btn.secondary.focused{background:rgba(255,255,255,0.18);transform:translateY(-2px);}
#heroPriceBadge{position:absolute;right:72px;bottom:80px;z-index:2;font-family:'Bebas Neue',sans-serif;font-size:52px;color:var(--green);text-shadow:0 0 40px rgba(34,211,238,0.4);opacity:0;animation:fadeUp 0.5s 0.2s ease both;}

/* ── HERO DOTS ── */
#heroDots{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:3;display:flex;gap:6px;}
.hero-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.25);transition:all 0.25s;}
.hero-dot.active{width:22px;border-radius:3px;background:var(--accent2);}

/* ── ROWS ── */
.row-section{padding:0 0 8px;}
.row-header{padding:0 72px 16px;display:flex;align-items:baseline;gap:14px;}
.row-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.08em;color:#fff;}
.row-subtitle{font-size:12px;color:var(--dim);font-family:'JetBrains Mono',monospace;}
.row-scroll{display:flex;gap:14px;padding:4px 72px 20px;overflow-x:auto;scroll-snap-type:x mandatory;}
.row-scroll::-webkit-scrollbar{display:none;}

/* ── GAME CARD ── */
.game-card{flex-shrink:0;width:var(--card-w);cursor:pointer;position:relative;transition:transform var(--transition);scroll-snap-align:start;}
.game-card.focused,.game-card:hover{transform:scale(1.08) translateY(-6px);}
.game-card.focused .gc-cover,.game-card:hover .gc-cover{box-shadow:0 0 0 3px var(--accent2),0 20px 60px rgba(124,58,237,0.5);}
.gc-cover{width:100%;aspect-ratio:3/4;border-radius:10px;overflow:hidden;background:#0d0a1a;position:relative;transition:box-shadow var(--transition);}
.gc-cover img{width:100%;height:100%;object-fit:cover;display:block;transition:filter 0.3s;}
.gc-cover-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:44px;background:linear-gradient(160deg,#1a0a3a,#0a0514);}
.gc-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(4,3,10,0.9) 0%,transparent 50%);opacity:0;transition:opacity 0.25s;}
.game-card.focused .gc-overlay,.game-card:hover .gc-overlay{opacity:1;}
.gc-badge{position:absolute;top:8px;right:8px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:3px 7px;border-radius:4px;letter-spacing:0.08em;text-transform:uppercase;}
.gc-badge.selling{background:rgba(34,211,238,0.15);border:1px solid rgba(34,211,238,0.3);color:var(--green);}
.gc-badge.playing{background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.35);color:var(--accent2);}
.gc-badge.played{background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.25);color:var(--gold);}
.gc-sold-badge{position:absolute;top:8px;left:8px;font-family:'JetBrains Mono',monospace;font-size:9px;background:rgba(244,63,94,0.2);border:1px solid rgba(244,63,94,0.3);color:var(--red);border-radius:4px;padding:3px 6px;}
.gc-price{position:absolute;bottom:8px;left:8px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--green);opacity:0;transition:opacity 0.2s;}
.game-card.focused .gc-price,.game-card:hover .gc-price{opacity:1;}
.gc-info{padding:10px 2px 4px;}
.gc-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gc-meta{font-size:10px;color:var(--muted);margin-top:2px;font-family:'JetBrains Mono',monospace;}

/* ── BUNDLE CARD ── */
.bundle-card{flex-shrink:0;width:320px;cursor:pointer;position:relative;border-radius:12px;overflow:hidden;border:1.5px solid rgba(251,191,36,0.2);background:linear-gradient(145deg,#150e02,#0d0720);transition:transform var(--transition),box-shadow var(--transition);scroll-snap-align:start;}
.bundle-card.focused,.bundle-card:hover{transform:scale(1.04) translateY(-4px);box-shadow:0 0 0 2px var(--gold),0 20px 60px rgba(251,191,36,0.25);border-color:var(--gold);}
.bc-mosaic{display:grid;grid-template-columns:1fr 1fr;gap:3px;height:180px;padding:8px;}
.bc-mosaic-img{border-radius:7px;overflow:hidden;background:#1a1005;display:flex;align-items:center;justify-content:center;font-size:24px;}
.bc-mosaic-img img{width:100%;height:100%;object-fit:cover;display:block;}
.bc-info{padding:14px 16px 16px;}
.bc-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.15em;color:var(--gold);text-transform:uppercase;margin-bottom:4px;}
.bc-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.05em;color:#fef3c7;margin-bottom:4px;}
.bc-meta{font-size:11px;color:rgba(251,191,36,0.4);font-family:'JetBrains Mono',monospace;}
.bc-price{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:800;color:var(--gold);margin-top:6px;}

/* ── FOLDER ROW ── */
.folder-pill{flex-shrink:0;padding:14px 22px;border-radius:10px;border:1px solid rgba(167,139,250,0.18);background:rgba(124,58,237,0.06);cursor:pointer;transition:all var(--transition);scroll-snap-align:start;display:flex;align-items:center;gap:12px;min-width:180px;}
.folder-pill.focused,.folder-pill:hover{background:rgba(124,58,237,0.18);border-color:rgba(167,139,250,0.5);transform:translateY(-3px);}
.folder-pill-icon{font-size:28px;}
.folder-pill-name{font-size:14px;font-weight:700;color:var(--text);}
.folder-pill-count{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px;}

/* ── GAME DETAIL OVERLAY ── */
#detailOverlay{position:fixed;inset:0;z-index:200;opacity:0;pointer-events:none;transition:opacity var(--transition);}
#detailOverlay.open{opacity:1;pointer-events:all;}
#detailBg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(40px) saturate(0.4) brightness(0.3);transform:scale(1.1);transition:background-image var(--transition);}
#detailVignette{position:absolute;inset:0;background:rgba(4,3,10,0.75);}
#detailPanel{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:60px 80px;}
#detailInner{position:relative;z-index:2;display:grid;grid-template-columns:280px 1fr;gap:52px;max-width:1100px;width:100%;animation:panelIn 0.4s cubic-bezier(0.22,1,0.36,1) both;}
@keyframes panelIn{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
#detailCover{border-radius:16px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.06);aspect-ratio:3/4;background:#0d0a1a;flex-shrink:0;}
#detailCover img{width:100%;height:100%;object-fit:cover;display:block;}
#detailCoverFallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:64px;background:linear-gradient(160deg,#1a0a3a,#0a0514);}
#detailInfo{display:flex;flex-direction:column;justify-content:center;gap:0;}
#detailStatus{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:10px;}
#detailTitle{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,5vw,76px);line-height:0.95;letter-spacing:0.02em;color:#fff;margin-bottom:14px;text-shadow:0 4px 40px rgba(0,0,0,0.5);}
#detailTags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;}
.detail-tag{font-size:11px;font-weight:600;padding:4px 11px;border-radius:5px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);letter-spacing:0.05em;text-transform:uppercase;}
#detailNotes{font-size:14px;color:var(--muted);line-height:1.65;margin-bottom:22px;max-width:520px;}
#detailStats{display:flex;gap:28px;margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid rgba(255,255,255,0.07);}
.ds-stat{display:flex;flex-direction:column;gap:3px;}
.ds-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--green);}
.ds-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;}
#detailLinks{display:flex;flex-direction:column;gap:8px;margin-bottom:28px;}
.detail-link-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-radius:9px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);cursor:pointer;transition:all 0.18s;}
.detail-link-row.focused,.detail-link-row:hover{background:rgba(124,58,237,0.18);border-color:rgba(124,58,237,0.4);}
.detail-link-row.focused{outline:2px solid var(--accent2);outline-offset:1px;}
.dlr-label{font-size:13px;font-weight:700;color:var(--text);flex:1;}
.dlr-price{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--green);}
.dlr-sold{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}
.dlr-launch{font-size:11px;font-weight:700;padding:6px 14px;background:var(--accent);border-radius:6px;color:#fff;}
#detailActions{display:flex;gap:10px;}
.detail-action-btn{display:flex;align-items:center;gap:8px;padding:12px 22px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all 0.15s;letter-spacing:0.03em;}
.detail-action-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 6px 24px rgba(124,58,237,0.45);}
.detail-action-btn.primary:hover,.detail-action-btn.primary.focused{transform:translateY(-2px);box-shadow:0 10px 36px rgba(124,58,237,0.6);}
.detail-action-btn.ghost{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:var(--text);}
.detail-action-btn.ghost:hover,.detail-action-btn.ghost.focused{background:rgba(255,255,255,0.14);}

/* ── SEARCH OVERLAY ── */
#searchOverlay{position:fixed;inset:0;z-index:300;background:rgba(4,3,10,0.92);backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;padding-top:140px;opacity:0;pointer-events:none;transition:opacity 0.25s;}
#searchOverlay.open{opacity:1;pointer-events:all;}
#searchInput{width:100%;max-width:700px;padding:20px 28px;font-size:28px;font-family:'Outfit',sans-serif;font-weight:300;background:rgba(255,255,255,0.05);border:2px solid rgba(124,58,237,0.5);border-radius:14px;color:#fff;outline:none;letter-spacing:0.02em;transition:border-color 0.2s;}
#searchInput:focus{border-color:var(--accent2);}
#searchInput::placeholder{color:rgba(255,255,255,0.2);}
#searchResults{width:100%;max-width:700px;margin-top:24px;display:flex;flex-direction:column;gap:8px;max-height:50vh;overflow-y:auto;}
.sr-item{display:flex;align-items:center;gap:16px;padding:14px 18px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);cursor:pointer;transition:all 0.15s;}
.sr-item.focused,.sr-item:hover{background:rgba(124,58,237,0.2);border-color:rgba(124,58,237,0.4);}
.sr-thumb{width:36px;height:48px;border-radius:6px;overflow:hidden;flex-shrink:0;background:#0d0a1a;display:flex;align-items:center;justify-content:center;font-size:20px;}
.sr-thumb img{width:100%;height:100%;object-fit:cover;}
.sr-title{font-size:16px;font-weight:700;color:var(--text);flex:1;}
.sr-tags{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.sr-price{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--green);}

/* ── GAMEPAD HINT BAR ── */
#gamepadBar{position:fixed;bottom:0;left:0;right:0;z-index:150;padding:14px 48px;background:linear-gradient(to top,rgba(4,3,10,0.98) 0%,transparent 100%);display:flex;align-items:center;gap:24px;pointer-events:none;opacity:0;transition:opacity 0.3s;}
#gamepadBar.visible{opacity:1;}
.gp-hint{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);}
.gp-btn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:800;font-family:'JetBrains Mono',monospace;flex-shrink:0;}
.gp-btn.a{background:#4caf50;color:#fff;}
.gp-btn.b{background:#f44336;color:#fff;}
.gp-btn.x{background:#2196f3;color:#fff;}
.gp-btn.y{background:#ff9800;color:#fff;}
.gp-btn.sq{background:rgba(255,255,255,0.12);color:var(--text);border-radius:5px;width:28px;font-size:9px;}
.gp-sep{width:1px;height:14px;background:rgba(255,255,255,0.08);}
#gpConnected{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--green);display:none;}
#gpConnected.show{display:block;}

/* ── NOTIFICATIONS ── */
#notif{position:fixed;top:80px;right:32px;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.notif-item{background:rgba(13,10,26,0.95);border:1px solid rgba(124,58,237,0.3);border-radius:10px;padding:12px 18px;font-size:13px;color:var(--text);backdrop-filter:blur(12px);animation:notifIn 0.3s ease both;max-width:280px;}
.notif-item.success{border-color:rgba(34,211,238,0.4);color:var(--green);}
@keyframes notifIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}

/* ── FOLDER VIEW ── */
#folderView{position:fixed;inset:0;z-index:180;background:rgba(4,3,10,0.98);backdrop-filter:blur(20px);display:none;flex-direction:column;padding:80px 72px 120px;}
#folderView.open{display:flex;}
#folderViewTitle{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:0.04em;color:#fff;margin-bottom:8px;}
#folderViewCount{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:28px;}
#folderViewGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--card-w),1fr));gap:18px;overflow-y:auto;flex:1;}

/* ── EMPTY STATE ── */
#emptyState{display:none;position:fixed;inset:0;z-index:5;align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center;padding:40px;}
#emptyState.show{display:flex;}
.es-icon{font-size:64px;margin-bottom:8px;opacity:0.3;}
.es-title{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--muted);}
.es-sub{font-size:14px;color:var(--dim);max-width:400px;line-height:1.6;}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  #detailInner{grid-template-columns:1fr;gap:24px;}
  #detailCover{max-width:200px;margin:0 auto;}
  #heroContent,#detailPanel{padding-left:28px;padding-right:28px;}
  .row-header,.row-scroll{padding-left:28px;padding-right:28px;}
  #folderView{padding:60px 28px 100px;}
}
</style>
</head>
<body>

<div id="cursor"></div>

<!-- Ambient background -->
<div id="ambientBg">
  <div class="amb-blob active" id="blob1"></div>
  <div class="amb-blob active" id="blob2"></div>
  <div class="amb-blob" id="blob3"></div>
</div>

<!-- Top bar -->
<div id="topBar">
  <div>
    <div class="tb-logo">🎮 Game Vault</div>
  </div>
  <div class="tb-stats" id="tbStats"></div>
  <div class="tb-right">
    <div id="clock"><span id="clockTime"></span></div>
  </div>
</div>

<!-- Main scrollable content -->
<div id="main">
  <!-- Hero -->
  <div id="hero">
    <div id="heroBg"></div>
    <div id="heroGradient"></div>
    <div id="heroContent">
      <div id="heroStatus"></div>
      <div id="heroTitle"></div>
      <div id="heroTags"></div>
      <div id="heroNotes"></div>
      <div id="heroActions">
        <button class="hero-btn primary focused" id="heroBtnDetail" data-idx="0">▶ View Details</button>
        <button class="hero-btn secondary" id="heroBtnNext" data-idx="1">Next Game →</button>
      </div>
    </div>
    <div id="heroPriceBadge"></div>
    <div id="heroDots"></div>
  </div>

  <!-- Rows injected by JS -->
  <div id="rows"></div>
</div>

<!-- Game Detail Overlay -->
<div id="detailOverlay">
  <div id="detailBg"></div>
  <div id="detailVignette"></div>
  <div id="detailPanel">
    <div id="detailInner">
      <div id="detailCover"></div>
      <div id="detailInfo">
        <div id="detailStatus"></div>
        <div id="detailTitle"></div>
        <div id="detailTags"></div>
        <div id="detailNotes"></div>
        <div id="detailStats"></div>
        <div id="detailLinks"></div>
        <div id="detailActions"></div>
      </div>
    </div>
  </div>
</div>

<!-- Search overlay -->
<div id="searchOverlay">
  <input id="searchInput" placeholder="Search your vault..." autocomplete="off" spellcheck="false">
  <div id="searchResults"></div>
</div>

<!-- Folder view -->
<div id="folderView">
  <div id="folderViewTitle"></div>
  <div id="folderViewCount"></div>
  <div id="folderViewGrid"></div>
</div>

<!-- Empty state -->
<div id="emptyState">
  <div class="es-icon">🎮</div>
  <div class="es-title">Vault is Empty</div>
  <div class="es-sub">No games found in Game Vault. Open Game Vault and add some games first, then come back here.</div>
</div>

<!-- Gamepad hints -->
<div id="gamepadBar">
  <div class="gp-hint"><span class="gp-btn a">A</span> Select</div>
  <div class="gp-sep"></div>
  <div class="gp-hint"><span class="gp-btn b">B</span> Back</div>
  <div class="gp-sep"></div>
  <div class="gp-hint"><span class="gp-btn x">X</span> Launch</div>
  <div class="gp-sep"></div>
  <div class="gp-hint"><span class="gp-btn y">Y</span> Search</div>
  <div class="gp-sep"></div>
  <div class="gp-hint"><span class="gp-btn sq">LB/RB</span> Rows</div>
  <div class="gp-sep"></div>
  <div class="gp-hint"><span class="gp-btn sq">START</span> Search</div>
  <span id="gpConnected">🎮 Gamepad Connected</span>
</div>

<!-- Notifications -->
<div id="notif"></div>

<script>
(function(){
'use strict';

/* ── DATA ── */
var GK='gv9',FK='gv-folders',BK='gv-bundles';
var games=[],folders=[],bundles=[];

function load(){
  try{var d=localStorage.getItem(GK);if(d)games=JSON.parse(d);}catch(e){}
  try{var f=localStorage.getItem(FK);if(f)folders=JSON.parse(f);}catch(e){}
  try{var b=localStorage.getItem(BK);if(b)bundles=JSON.parse(b);}catch(e){}
}

function maxP(g){return Math.max.apply(null,[0].concat((g.links||[]).map(function(l){return parseFloat(l.price)||0;})));}
function totalSold(g){return(g.links||[]).reduce(function(s,l){return s+(l.soldCount||0);},0);}
function totalRev(g){return(g.links||[]).reduce(function(s,l){return s+((l.soldCount||0)*(parseFloat(l.price)||0));},0);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── CURSOR ── */
var cursor=document.getElementById('cursor');
document.addEventListener('mousemove',function(e){
  cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';
});
document.addEventListener('mousedown',function(){cursor.classList.add('click');});
document.addEventListener('mouseup',function(){cursor.classList.remove('click');});

/* ── CLOCK ── */
function updateClock(){
  var now=new Date();
  var h=now.getHours()%12||12,m=String(now.getMinutes()).padStart(2,'0'),ap=now.getHours()>=12?'PM':'AM';
  document.getElementById('clockTime').textContent=h+':'+m+' '+ap;
}
updateClock();setInterval(updateClock,10000);

/* ── NOTIFICATIONS ── */
function notify(msg,type){
  var el=document.createElement('div');
  el.className='notif-item'+(type?' '+type:'');
  el.textContent=msg;
  document.getElementById('notif').appendChild(el);
  setTimeout(function(){el.style.opacity='0';el.style.transition='opacity 0.4s';setTimeout(function(){el.remove();},400);},2800);
}

/* ── STATS BAR ── */
function renderStats(){
  var tL=games.reduce(function(s,g){return s+(g.links||[]).length;},0);
  var tS=games.reduce(function(s,g){return s+totalSold(g);},0);
  var tR=games.reduce(function(s,g){return s+totalRev(g);},0);
  var selling=games.filter(function(g){return g.status==='selling';}).length;
  document.getElementById('tbStats').innerHTML=
    '<div class="tb-stat">Games <span>'+games.length+'</span></div>'+
    '<div class="tb-stat">For Sale <span>'+selling+'</span></div>'+
    '<div class="tb-stat">Links <span>'+tL+'</span></div>'+
    '<div class="tb-stat">Sales <span>'+tS+'</span></div>'+
    '<div class="tb-stat">Revenue <span>$'+tR.toFixed(2)+'</span></div>';
}

/* ── HERO ── */
var heroIdx=0;
var heroGames=[];
var heroAutoTimer=null;

function startHeroAuto(){
  clearInterval(heroAutoTimer);
  heroAutoTimer=setInterval(function(){
    heroIdx=(heroIdx+1)%Math.max(1,heroGames.length);
    renderHero();
  },7000);
}

function renderHero(){
  if(!heroGames.length)return;
  var g=heroGames[heroIdx];
  var price=maxP(g);
  var sold=totalSold(g);
  var rev=totalRev(g);

  /* background */
  if(g.cover){
    document.getElementById('heroBg').style.backgroundImage='url('+JSON.stringify(g.cover)+')';
    document.getElementById('heroBg').style.opacity='1';
    /* dynamic accent from cover — approximate with hue */
    document.getElementById('blob1').style.background='rgba(124,58,237,0.8)';
  } else {
    document.getElementById('heroBg').style.opacity='0';
  }

  /* content */
  document.getElementById('heroStatus').textContent=g.status?g.status.toUpperCase():'';
  document.getElementById('heroStatus').style.color=
    g.status==='selling'?'var(--green)':g.status==='playing'?'var(--accent2)':'var(--gold)';
  document.getElementById('heroTitle').textContent=g.title||'Unknown';
  document.getElementById('heroTags').innerHTML=(g.tags||[]).slice(0,5).map(function(t){
    return '<span class="hero-tag">'+esc(t)+'</span>';
  }).join('');
  document.getElementById('heroNotes').textContent=g.notes||'';
  document.getElementById('heroPriceBadge').textContent=price?'$'+price:'';

  /* dots */
  var dots=document.getElementById('heroDots');
  dots.innerHTML=heroGames.slice(0,8).map(function(_,i){
    return '<div class="hero-dot'+(i===heroIdx?' active':'')+'"></div>';
  }).join('');

  /* reset animations */
  ['heroStatus','heroTitle','heroTags','heroNotes','heroActions','heroPriceBadge'].forEach(function(id){
    var el=document.getElementById(id);
    el.style.animation='none';el.offsetHeight;el.style.animation='';
  });
}

/* ── ROWS ── */
function buildRows(){
  var container=document.getElementById('rows');
  container.innerHTML='';

  var EMOJIS=['🎮','⚔️','🏰','🚀','🧙','🐉','🌌','🔫','🎯','🌊'];

  function makeCard(g,i){
    var price=maxP(g);var sold=totalSold(g);
    var emoji=EMOJIS[i%EMOJIS.length];
    return '<div class="game-card" data-gid="'+g.id+'" tabindex="0">'+
      '<div class="gc-cover">'+
        (g.cover?'<img src="'+esc(g.cover)+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">':'')+
        (!g.cover?'<div class="gc-cover-fallback">'+emoji+'</div>':'')+
        '<div class="gc-overlay"></div>'+
        (g.status?'<div class="gc-badge '+g.status+'">'+g.status+'</div>':'')+
        (sold>0?'<div class="gc-sold-badge">×'+sold+'</div>':'')+
        (price?'<div class="gc-price">$'+price+'</div>':'')+
      '</div>'+
      '<div class="gc-info">'+
        '<div class="gc-title">'+esc(g.title)+'</div>'+
        '<div class="gc-meta">'+(g.links||[]).length+' link'+((g.links||[]).length!==1?'s':'')+'</div>'+
      '</div>'+
    '</div>';
  }

  function addRow(title,subtitle,items,renderFn){
    if(!items||!items.length)return;
    var sec=document.createElement('div');
    sec.className='row-section';
    sec.innerHTML='<div class="row-header"><div class="row-title">'+title+'</div><div class="row-subtitle">'+subtitle+'</div></div>'+
      '<div class="row-scroll">'+items.map(renderFn).join('')+'</div>';
    container.appendChild(sec);
  }

  /* For Sale */
  var forSale=games.filter(function(g){return g.status==='selling';});
  addRow('🛒 For Sale','Available now',forSale,function(g,i){return makeCard(g,i);});

  /* Bundles spotlight */
  if(bundles.length){
    var sec=document.createElement('div');
    sec.className='row-section';
    sec.innerHTML='<div class="row-header"><div class="row-title">📦 Bundles</div><div class="row-subtitle">Best value</div></div>'+
      '<div class="row-scroll">'+bundles.map(function(b){
        var bGames=(b.gameIds||[]).map(function(gid){return games.find(function(x){return x.id===gid;});}).filter(Boolean);
        var mosaic=bGames.slice(0,4).map(function(g){
          return'<div class="bc-mosaic-img">'+(g.cover?'<img src="'+esc(g.cover)+'" loading="lazy" onerror="this.style.display=\'none\'">':'🎮')+'</div>';
        }).join('');
        return'<div class="bundle-card" data-bid="'+b.id+'">'+
          '<div class="bc-mosaic">'+mosaic+'</div>'+
          '<div class="bc-info">'+
            '<div class="bc-label">Bundle · '+bGames.length+' Games</div>'+
            '<div class="bc-name">'+esc(b.name)+'</div>'+
            (b.notes?'<div class="bc-meta">'+esc(b.notes.slice(0,60))+'</div>':'')+
            (b.price?'<div class="bc-price">$'+b.price+'</div>':'')+
          '</div>'+
        '</div>';
      }).join('')+'</div>';
    container.appendChild(sec);
  }

  /* Folders */
  if(folders.length){
    var sec2=document.createElement('div');
    sec2.className='row-section';
    sec2.innerHTML='<div class="row-header"><div class="row-title">📁 Folders</div><div class="row-subtitle">Collections</div></div>'+
      '<div class="row-scroll">'+folders.map(function(f){
        var cnt=(f.gameIds||[]).length;
        return'<div class="folder-pill" data-fid="'+f.id+'">'+
          '<div class="folder-pill-icon">📁</div>'+
          '<div><div class="folder-pill-name">'+esc(f.name)+'</div>'+
          '<div class="folder-pill-count">'+cnt+' game'+(cnt!==1?'s':'')+'</div></div>'+
        '</div>';
      }).join('')+'</div>';
    container.appendChild(sec2);
  }

  /* Currently Playing */
  var playing=games.filter(function(g){return g.status==='playing';});
  addRow('▶ Now Playing','Currently active',playing,function(g,i){return makeCard(g,i);});

  /* Recently Added */
  var recent=games.slice().reverse().slice(0,20);
  addRow('🆕 Recently Added','New to vault',recent,function(g,i){return makeCard(g,i);});

  /* Top Sellers */
  var topSellers=games.filter(function(g){return totalSold(g)>0;}).sort(function(a,b){return totalSold(b)-totalSold(a);}).slice(0,20);
  addRow('🔥 Top Sellers','Most popular',topSellers,function(g,i){return makeCard(g,i);});

  /* By tag — auto-generate rows for common tags */
  var tagCounts={};
  games.forEach(function(g){(g.tags||[]).forEach(function(t){tagCounts[t]=(tagCounts[t]||0)+1;});});
  var popularTags=Object.keys(tagCounts).filter(function(t){return tagCounts[t]>=2;}).sort(function(a,b){return tagCounts[b]-tagCounts[a];}).slice(0,6);
  popularTags.forEach(function(tag){
    var tagged=games.filter(function(g){return(g.tags||[]).some(function(t){return t.toLowerCase()===tag.toLowerCase();});});
    addRow('🏷 '+tag.charAt(0).toUpperCase()+tag.slice(1),'Tagged collection — '+tagged.length+' games',tagged,function(g,i){return makeCard(g,i);});
  });

  /* All Games */
  addRow('🎮 All Games','Your complete vault',games,function(g,i){return makeCard(g,i);});

  wireCards();
}

function wireCards(){
  document.querySelectorAll('.game-card').forEach(function(card){
    card.addEventListener('click',function(){openDetail(this.dataset.gid);});
    card.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){openDetail(this.dataset.gid);}});
    card.addEventListener('mouseenter',function(){this.classList.add('focused');});
    card.addEventListener('mouseleave',function(){this.classList.remove('focused');});
  });
  document.querySelectorAll('.bundle-card').forEach(function(card){
    card.addEventListener('click',function(){openBundleDetail(this.dataset.bid);});
  });
  document.querySelectorAll('.folder-pill').forEach(function(pill){
    pill.addEventListener('click',function(){openFolder(this.dataset.fid);});
  });
}

/* ── GAME DETAIL ── */
var currentDetailGame=null;
var detailFocusIdx=0;

function openDetail(gid){
  var g=games.find(function(x){return x.id===gid;});if(!g)return;
  currentDetailGame=g;detailFocusIdx=0;
  var price=maxP(g);var sold=totalSold(g);var rev=totalRev(g);

  /* background */
  document.getElementById('detailBg').style.backgroundImage=g.cover?'url('+JSON.stringify(g.cover)+')':'';

  /* cover */
  document.getElementById('detailCover').innerHTML=g.cover
    ?'<img src="'+esc(g.cover)+'" alt="" onerror="this.style.display=\'none\'">'
    :'<div id="detailCoverFallback">🎮</div>';

  /* status */
  var statusColor=g.status==='selling'?'var(--green)':g.status==='playing'?'var(--accent2)':'var(--gold)';
  document.getElementById('detailStatus').innerHTML=g.status?'<span style="color:'+statusColor+';font-family:\'JetBrains Mono\',monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;">'+esc(g.status)+'</span>':'';
  document.getElementById('detailTitle').textContent=g.title||'Unknown';
  document.getElementById('detailTags').innerHTML=(g.tags||[]).map(function(t){return'<span class="detail-tag">'+esc(t)+'</span>';}).join('');
  document.getElementById('detailNotes').textContent=g.notes||'';

  /* stats */
  document.getElementById('detailStats').innerHTML=
    (price?'<div class="ds-stat"><div class="ds-val">$'+price+'</div><div class="ds-lbl">Price</div></div>':'')+
    '<div class="ds-stat"><div class="ds-val">'+(g.links||[]).length+'</div><div class="ds-lbl">Links</div></div>'+
    '<div class="ds-stat"><div class="ds-val">'+sold+'</div><div class="ds-lbl">Sold</div></div>'+
    (rev>0?'<div class="ds-stat"><div class="ds-val">$'+rev.toFixed(2)+'</div><div class="ds-lbl">Revenue</div></div>':'');

  /* links */
  var linksHtml=(g.links||[]).map(function(l,i){
    var p=parseFloat(l.price)||0;var sc=l.soldCount||0;
    return'<div class="detail-link-row'+(i===0?' focused':'')+'" data-link-idx="'+i+'" data-url="'+esc(l.url)+'">'+
      '<div class="dlr-label">'+esc(l.label||'Link '+(i+1))+'</div>'+
      (p?'<div class="dlr-price">$'+p.toFixed(2)+'</div>':'')+
      (sc>0?'<div class="dlr-sold">×'+sc+' sold</div>':'')+
      '<div class="dlr-launch">Launch ↗</div>'+
    '</div>';
  }).join('');
  document.getElementById('detailLinks').innerHTML=linksHtml||'<div style="font-size:13px;color:var(--muted)">No links added yet.</div>';

  /* wire link clicks */
  document.querySelectorAll('.detail-link-row').forEach(function(row){
    row.addEventListener('click',function(){
      var url=this.dataset.url;
      if(url){window.open(url,'_blank');notify('Launching '+esc(g.title)+'…','success');}
    });
    row.addEventListener('mouseenter',function(){
      document.querySelectorAll('.detail-link-row').forEach(function(r){r.classList.remove('focused');});
      this.classList.add('focused');
      detailFocusIdx=parseInt(this.dataset.linkIdx)||0;
    });
  });

  /* actions */
  document.getElementById('detailActions').innerHTML=
    '<button class="detail-action-btn primary focused" id="daBtnLaunch">▶ Launch</button>'+
    '<button class="detail-action-btn ghost" id="daBtnClose">✕ Close</button>';

  document.getElementById('daBtnLaunch').onclick=function(){
    var links=g.links||[];if(!links.length){notify('No links for this game');return;}
    var url=links[detailFocusIdx]?links[detailFocusIdx].url:links[0].url;
    if(url){window.open(url,'_blank');notify('Launching '+g.title+'…','success');}
  };
  document.getElementById('daBtnClose').onclick=closeDetail;

  document.getElementById('detailOverlay').classList.add('open');
  document.getElementById('gamepadBar').innerHTML=document.getElementById('gamepadBar').innerHTML;
}

function closeDetail(){document.getElementById('detailOverlay').classList.remove('open');}

/* ── BUNDLE DETAIL ── */
function openBundleDetail(bid){
  var b=bundles.find(function(x){return x.id===bid;});if(!b)return;
  var bGames=(b.gameIds||[]).map(function(gid){return games.find(function(x){return x.id===gid;});}).filter(Boolean);
  /* show as a pseudo-game */
  var fakeG={
    id:bid,title:b.name,cover:bGames[0]?bGames[0].cover:'',
    tags:['Bundle',bGames.length+' Games'],notes:b.notes||bGames.map(function(g){return g.title;}).join(' · '),
    status:'selling',links:[],color:'#78350f'
  };
  if(b.price)fakeG.links=[{label:'Bundle Price',url:'',price:b.price,soldCount:b.soldCount||0}];
  /* patch detail open but no launch */
  openDetail(bid);
  /* override title and actions */
  setTimeout(function(){
    document.getElementById('detailTitle').textContent=b.name;
    document.getElementById('detailLinks').innerHTML=bGames.map(function(g){
      return'<div class="detail-link-row" style="cursor:default;">'+
        '<div class="dlr-label">🎮 '+esc(g.title)+'</div>'+
        (maxP(g)?'<div class="dlr-price">$'+maxP(g)+'</div>':'')+
      '</div>';
    }).join('');
    document.getElementById('detailActions').innerHTML=
      '<button class="detail-action-btn ghost" onclick="document.getElementById(\'detailOverlay\').classList.remove(\'open\')">✕ Close</button>';
  },50);
}

/* ── FOLDER VIEW ── */
function openFolder(fid){
  var f=folders.find(function(x){return x.id===fid;});if(!f)return;
  var fGames=(f.gameIds||[]).map(function(gid){return games.find(function(x){return x.id===gid;});}).filter(Boolean);
  document.getElementById('folderViewTitle').textContent='📁 '+f.name;
  document.getElementById('folderViewCount').textContent=fGames.length+' game'+(fGames.length!==1?'s':'');
  var EMOJIS=['🎮','⚔️','🏰','🚀','🧙','🐉','🌌','🔫','🎯','🌊'];
  document.getElementById('folderViewGrid').innerHTML=fGames.map(function(g,i){
    var price=maxP(g);var sold=totalSold(g);var emoji=EMOJIS[i%EMOJIS.length];
    return'<div class="game-card" data-gid="'+g.id+'" tabindex="0" style="width:100%;">'+
      '<div class="gc-cover">'+
        (g.cover?'<img src="'+esc(g.cover)+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">':'')+
        (!g.cover?'<div class="gc-cover-fallback">'+emoji+'</div>':'')+
        '<div class="gc-overlay"></div>'+
        (g.status?'<div class="gc-badge '+g.status+'">'+g.status+'</div>':'')+
        (sold>0?'<div class="gc-sold-badge">×'+sold+'</div>':'')+
        (price?'<div class="gc-price">$'+price+'</div>':'')+
      '</div>'+
      '<div class="gc-info"><div class="gc-title">'+esc(g.title)+'</div>'+
      '<div class="gc-meta">'+(g.links||[]).length+' link'+((g.links||[]).length!==1?'s':'')+'</div></div>'+
    '</div>';
  }).join('');
  document.querySelectorAll('#folderViewGrid .game-card').forEach(function(card){
    card.addEventListener('click',function(){openDetail(this.dataset.gid);});
    card.addEventListener('mouseenter',function(){this.classList.add('focused');});
    card.addEventListener('mouseleave',function(){this.classList.remove('focused');});
  });
  document.getElementById('folderView').classList.add('open');
}
function closeFolder(){document.getElementById('folderView').classList.remove('open');}

/* ── SEARCH ── */
var searchOpen=false;
function openSearch(){
  searchOpen=true;
  document.getElementById('searchOverlay').classList.add('open');
  document.getElementById('searchInput').value='';
  document.getElementById('searchResults').innerHTML='';
  setTimeout(function(){document.getElementById('searchInput').focus();},100);
}
function closeSearch(){
  searchOpen=false;
  document.getElementById('searchOverlay').classList.remove('open');
}

document.getElementById('searchInput').addEventListener('input',function(){
  var q=this.value.toLowerCase().trim();
  if(!q){document.getElementById('searchResults').innerHTML='';return;}
  var results=games.filter(function(g){
    return g.title.toLowerCase().includes(q)||
      (g.tags||[]).some(function(t){return t.toLowerCase().includes(q);})||
      (g.notes||'').toLowerCase().includes(q)||
      (g.links||[]).some(function(l){return(l.label||'').toLowerCase().includes(q);});
  }).slice(0,12);
  var EMOJIS=['🎮','⚔️','🏰','🚀','🧙','🐉'];
  document.getElementById('searchResults').innerHTML=results.map(function(g,i){
    var price=maxP(g);
    return'<div class="sr-item" data-gid="'+g.id+'">'+
      '<div class="sr-thumb">'+(g.cover?'<img src="'+esc(g.cover)+'" onerror="this.style.display=\'none\'">':EMOJIS[i%EMOJIS.length])+'</div>'+
      '<div style="flex:1;min-width:0;"><div class="sr-title">'+esc(g.title)+'</div>'+
      '<div class="sr-tags">'+esc((g.tags||[]).join(' · '))+'</div></div>'+
      (price?'<div class="sr-price">$'+price+'</div>':'')+
    '</div>';
  }).join('')||'<div style="color:var(--muted);font-size:14px;text-align:center;padding:20px;">No results for "'+esc(q)+'"</div>';
  document.querySelectorAll('.sr-item').forEach(function(item){
    item.addEventListener('click',function(){closeSearch();openDetail(this.dataset.gid);});
  });
});

/* ── KEYBOARD ── */
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if(searchOpen)closeSearch();
    else if(document.getElementById('detailOverlay').classList.contains('open'))closeDetail();
    else if(document.getElementById('folderView').classList.contains('open'))closeFolder();
    return;
  }
  if(e.key==='/'||e.key==='f'&&e.ctrlKey){e.preventDefault();openSearch();return;}
  if(e.key==='ArrowRight'&&!searchOpen&&!document.getElementById('detailOverlay').classList.contains('open')){
    heroIdx=(heroIdx+1)%Math.max(1,heroGames.length);renderHero();startHeroAuto();
  }
  if(e.key==='ArrowLeft'&&!searchOpen&&!document.getElementById('detailOverlay').classList.contains('open')){
    heroIdx=(heroIdx-1+heroGames.length)%Math.max(1,heroGames.length);renderHero();startHeroAuto();
  }
  if(e.key==='Enter'&&!searchOpen&&!document.getElementById('detailOverlay').classList.contains('open')){
    if(heroGames[heroIdx])openDetail(heroGames[heroIdx].id);
  }
});

/* ── GAMEPAD ── */
var gpState={connected:false,axes:[0,0,0,0],buttons:Array(17).fill(false),prevButtons:Array(17).fill(false)};
var gpRowFocus=0,gpColFocus=0;
var gpRepeat={left:0,right:0,up:0,down:0};

function gpBtnDown(idx){return gpState.buttons[idx]&&!gpState.prevButtons[idx];}
function gpBtnHeld(idx){return gpState.buttons[idx];}

var gpNavRows=[];
function buildGpNavRows(){
  gpNavRows=[];
  /* hero buttons */
  gpNavRows.push({type:'hero',els:[document.getElementById('heroBtnDetail'),document.getElementById('heroBtnNext')]});
  /* each row */
  document.querySelectorAll('.row-section').forEach(function(sec){
    var cards=Array.from(sec.querySelectorAll('.game-card,.bundle-card,.folder-pill'));
    if(cards.length)gpNavRows.push({type:'row',els:cards,scroll:sec.querySelector('.row-scroll')});
  });
}

function gpFocusEl(row,col){
  /* clear all focus */
  document.querySelectorAll('.game-card,.bundle-card,.folder-pill,.hero-btn').forEach(function(el){el.classList.remove('focused');});
  var r=gpNavRows[row];if(!r)return;
  var el=r.els[col];if(!el)return;
  el.classList.add('focused');
  el.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
}

function pollGamepad(){
  var gps=navigator.getGamepads?navigator.getGamepads():[];
  var gp=gps[0];
  if(!gp){requestAnimationFrame(pollGamepad);return;}

  if(!gpState.connected){
    gpState.connected=true;
    document.getElementById('gpConnected').classList.add('show');
    document.getElementById('gamepadBar').classList.add('visible');
    notify('🎮 Gamepad connected!','success');
    buildGpNavRows();
    gpFocusEl(0,0);
  }

  gpState.prevButtons=gpState.buttons.slice();
  gpState.buttons=Array.from(gp.buttons).map(function(b){return b.pressed;});
  gpState.axes=Array.from(gp.axes);

  var ax=gpState.axes[0]||0,ay=gpState.axes[1]||0;
  var LEFT=gpBtnDown(14)||ax<-0.5;
  var RIGHT=gpBtnDown(15)||ax>0.5;
  var UP=gpBtnDown(12)||ay<-0.5;
  var DOWN=gpBtnDown(13)||ay>0.5;

  /* deadzone for held navigation */
  var now=Date.now();
  var HELD_DELAY=180,HELD_REPEAT=120;

  if(ax<-0.5){if(!gpRepeat.left)gpRepeat.left=now+HELD_DELAY;else if(now>gpRepeat.left){gpRepeat.left=now+HELD_REPEAT;LEFT=true;}}else gpRepeat.left=0;
  if(ax>0.5){if(!gpRepeat.right)gpRepeat.right=now+HELD_DELAY;else if(now>gpRepeat.right){gpRepeat.right=now+HELD_REPEAT;RIGHT=true;}}else gpRepeat.right=0;
  if(ay<-0.5){if(!gpRepeat.up)gpRepeat.up=now+HELD_DELAY;else if(now>gpRepeat.up){gpRepeat.up=now+HELD_REPEAT;UP=true;}}else gpRepeat.up=0;
  if(ay>0.5){if(!gpRepeat.down)gpRepeat.down=now+HELD_DELAY;else if(now>gpRepeat.down){gpRepeat.down=now+HELD_REPEAT;DOWN=true;}}else gpRepeat.down=0;

  var detailOpen=document.getElementById('detailOverlay').classList.contains('open');
  var folderOpen=document.getElementById('folderView').classList.contains('open');

  if(detailOpen){
    /* navigate detail links */
    var linkRows=document.querySelectorAll('.detail-link-row');
    if(UP&&detailFocusIdx>0){detailFocusIdx--;linkRows.forEach(function(r,i){r.classList.toggle('focused',i===detailFocusIdx);});}
    if(DOWN&&detailFocusIdx<linkRows.length-1){detailFocusIdx++;linkRows.forEach(function(r,i){r.classList.toggle('focused',i===detailFocusIdx);});}
    if(gpBtnDown(0)){/* A — launch */var focused=document.querySelector('.detail-link-row.focused');if(focused)focused.click();}
    if(gpBtnDown(1)||gpBtnDown(9)){closeDetail();}/* B or Start */
    if(gpBtnDown(2)&&currentDetailGame){/* X — launch first link */
      var links=currentDetailGame.links||[];if(links[0]&&links[0].url)window.open(links[0].url,'_blank');
    }
  } else if(folderOpen){
    if(gpBtnDown(1))closeFolder();
    var fCards=Array.from(document.querySelectorAll('#folderViewGrid .game-card'));
    var fIdx=fCards.findIndex(function(c){return c.classList.contains('focused');});
    if(fIdx<0)fIdx=0;
    if(LEFT&&fIdx>0){fCards[fIdx].classList.remove('focused');fCards[fIdx-1].classList.add('focused');}
    if(RIGHT&&fIdx<fCards.length-1){fCards[fIdx].classList.remove('focused');fCards[fIdx+1].classList.add('focused');}
    if(gpBtnDown(0)&&fCards[fIdx])openDetail(fCards[fIdx].dataset.gid);
  } else if(searchOpen){
    if(gpBtnDown(1)||gpBtnDown(9))closeSearch();
    var srItems=Array.from(document.querySelectorAll('.sr-item'));
    var srIdx=srItems.findIndex(function(s){return s.classList.contains('focused');});
    if(DOWN&&srIdx<srItems.length-1){srItems.forEach(function(s){s.classList.remove('focused');});if(srIdx+1<srItems.length)srItems[srIdx+1].classList.add('focused');}
    if(UP&&srIdx>0){srItems.forEach(function(s){s.classList.remove('focused');});srItems[srIdx-1].classList.add('focused');}
    if(gpBtnDown(0)){var sf=document.querySelector('.sr-item.focused');if(sf){closeSearch();openDetail(sf.dataset.gid);}}
  } else {
    /* main nav */
    if(gpBtnDown(3))openSearch();/* Y */
    if(gpBtnDown(9))openSearch();/* Start */
    if(gpBtnDown(1)){/* B — hero cycle */heroIdx=(heroIdx+1)%Math.max(1,heroGames.length);renderHero();startHeroAuto();}
    if(gpBtnDown(4)){/* LB — prev row */gpRowFocus=Math.max(0,gpRowFocus-1);gpColFocus=0;gpFocusEl(gpRowFocus,gpColFocus);buildGpNavRows();}
    if(gpBtnDown(5)){/* RB — next row */gpRowFocus=Math.min(gpNavRows.length-1,gpRowFocus+1);gpColFocus=0;gpFocusEl(gpRowFocus,gpColFocus);buildGpNavRows();}
    if(LEFT){gpColFocus=Math.max(0,gpColFocus-1);gpFocusEl(gpRowFocus,gpColFocus);}
    if(RIGHT){var r=gpNavRows[gpRowFocus];if(r)gpColFocus=Math.min(r.els.length-1,gpColFocus+1);gpFocusEl(gpRowFocus,gpColFocus);}
    if(UP){gpRowFocus=Math.max(0,gpRowFocus-1);gpColFocus=0;gpFocusEl(gpRowFocus,gpColFocus);}
    if(DOWN){gpRowFocus=Math.min(gpNavRows.length-1,gpRowFocus+1);gpColFocus=0;gpFocusEl(gpRowFocus,gpColFocus);}
    if(gpBtnDown(0)){/* A — select */
      var r2=gpNavRows[gpRowFocus];if(!r2){}
      else{var el=r2.els[gpColFocus];if(el)el.click();}
    }
    /* scroll main for up/down on rows */
    if(DOWN||UP){
      var activeRow=document.querySelector('.row-section:nth-child('+(gpRowFocus)+')');
      if(activeRow)activeRow.scrollIntoView({block:'nearest',behavior:'smooth'});
    }
  }

  requestAnimationFrame(pollGamepad);
}

window.addEventListener('gamepadconnected',function(){pollGamepad();});
/* Start polling anyway in case already connected */
setTimeout(pollGamepad,500);

/* ── HERO WIRING ── */
document.getElementById('heroBtnDetail').addEventListener('click',function(){
  if(heroGames[heroIdx])openDetail(heroGames[heroIdx].id);
});
document.getElementById('heroBtnNext').addEventListener('click',function(){
  heroIdx=(heroIdx+1)%Math.max(1,heroGames.length);renderHero();startHeroAuto();
});

/* ── ESCAPE / BACK ── */
document.getElementById('detailOverlay').addEventListener('click',function(e){if(e.target===document.getElementById('detailPanel')||e.target===document.getElementById('detailVignette'))closeDetail();});

/* ── INIT ── */
function init(){
  load();
  if(!games.length){document.getElementById('emptyState').classList.add('show');return;}

  renderStats();

  /* Hero games: for sale first, then all */
  heroGames=games.filter(function(g){return g.status==='selling';});
  if(heroGames.length<3)heroGames=games.slice().reverse();
  heroGames=heroGames.slice(0,12);
  heroIdx=0;
  renderHero();
  startHeroAuto();

  buildRows();

  /* Show gamepad bar hint */
  setTimeout(function(){document.getElementById('gamepadBar').classList.add('visible');},1000);

  /* Y key for search */
  document.addEventListener('keydown',function(e){
    if(e.key==='y'||e.key==='Y'){openSearch();}
  });
}

init();

})();
</script>
