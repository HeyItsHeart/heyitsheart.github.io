<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Super Mario 64</title>

    <style>
      body, html {
        margin: 0;
        background: black;
        overflow: hidden;
        touch-action: none;
      }

      canvas {
        width: 100vw;
        height: 100vh;
      }

      /* ===== MOBILE CONTROLS ===== */
      #controls {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }

      button {
        pointer-events: auto;
        position: absolute;
        border: none;
        border-radius: 50%;
        font-weight: bold;
        color: white;
        opacity: 0.85;
      }

      /* Joystick */
      #joystick {
        position: absolute;
        bottom: 20px;
        left: 20px;
        width: 120px;
        height: 120px;
        background: rgba(255,255,255,0.1);
        border-radius: 50%;
        pointer-events: auto;
      }

      #stick {
        width: 50px;
        height: 50px;
        background: rgba(255,255,255,0.5);
        border-radius: 50%;
        position: absolute;
        top: 35px;
        left: 35px;
      }

      /* A B buttons (fixed spacing) */
      .a {
        right: 30px;
        bottom: 110px;
        width: 70px;
        height: 70px;
        background: green;
      }

      .b {
        right: 110px;
        bottom: 60px;
        width: 60px;
        height: 60px;
        background: red;
      }

      /* C buttons ABOVE A/B */
      .c {
        width: 45px;
        height: 45px;
        background: gold;
      }

      .c-up { right: 100px; bottom: 200px; }
      .c-down { right: 100px; bottom: 140px; }
      .c-left { right: 150px; bottom: 170px; }
      .c-right { right: 50px; bottom: 170px; }

      /* D-pad */
      .d { width: 40px; height: 40px; background: gray; }
      .d-up { left: 160px; bottom: 140px; }
      .d-down { left: 160px; bottom: 40px; }
      .d-left { left: 120px; bottom: 90px; }
      .d-right { left: 200px; bottom: 90px; }

      /* Start */
      .start {
        left: 50%;
        bottom: 60px;
        transform: translateX(-50%);
        width: 80px;
        height: 40px;
        border-radius: 10px;
        background: blue;
      }

      /* L R Z */
      .l {
        left: 20px;
        top: 20px;
        width: 60px;
        height: 40px;
        background: purple;
        border-radius: 10px;
      }

      .r {
        right: 20px;
        top: 20px;
        width: 60px;
        height: 40px;
        background: purple;
        border-radius: 10px;
      }

      .z {
        left: 50%;
        top: 20px;
        transform: translateX(-50%);
        width: 80px;
        height: 40px;
        background: orange;
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <canvas id="canvas"></canvas>

    <!-- CONTROLS -->
    <div id="controls">
      <div id="joystick"><div id="stick"></div></div>

      <button class="a">A</button>
      <button class="b">B</button>

      <button class="c c-up">C↑</button>
      <button class="c c-down">C↓</button>
      <button class="c c-left">C←</button>
      <button class="c c-right">C→</button>

      <button class="d d-up">↑</button>
      <button class="d d-down">↓</button>
      <button class="d d-left">←</button>
      <button class="d d-right">→</button>

      <button class="start">START</button>

      <button class="l">L</button>
      <button class="r">R</button>
      <button class="z">Z</button>
    </div>

<script>
var Module = {
  canvas: document.getElementById("canvas")
};

const canvas = Module.canvas;

/* Force focus so input is accepted */
canvas.setAttribute("tabindex", "0");
canvas.focus();

/* KEY STATE SYSTEM */
const keysDown = new Set();

function sendKey(code, keyCode, type) {
  const event = new KeyboardEvent(type, {
    code: code,
    key: code,
    keyCode: keyCode,
    which: keyCode,
    bubbles: true
  });

  document.dispatchEvent(event);
  window.dispatchEvent(event);
  canvas.dispatchEvent(event);
}

function press(code, keyCode) {
  if (keysDown.has(code)) return;
  keysDown.add(code);
  sendKey(code, keyCode, "keydown");
}

function release(code, keyCode) {
  keysDown.delete(code);
  sendKey(code, keyCode, "keyup");
}

/* Prevent scrolling */
document.body.addEventListener("touchstart", e => e.preventDefault(), { passive: false });
document.body.addEventListener("touchmove", e => e.preventDefault(), { passive: false });

function bind(selector, code, keyCode) {
  const el = document.querySelector(selector);

  el.addEventListener("touchstart", (e) => {
    e.preventDefault();
    press(code, keyCode);
  });

  el.addEventListener("touchend", (e) => {
    e.preventDefault();
    release(code, keyCode);
  });
}

/* ✅ UPDATED BUTTON MAP */
bind(".a", "KeyX", 88);     // A = X
bind(".b", "KeyC", 67);     // B = C

bind(".start", "Enter", 13);

bind(".l", "KeyQ", 81);
bind(".r", "KeyE", 69);

bind(".z", "Space", 32);    // Z = Space

bind(".c-up", "KeyI", 73);
bind(".c-down", "KeyK", 75);
bind(".c-left", "KeyJ", 74);
bind(".c-right", "KeyL", 76);

bind(".d-up", "ArrowUp", 38);
bind(".d-down", "ArrowDown", 40);
bind(".d-left", "ArrowLeft", 37);
bind(".d-right", "ArrowRight", 39);

/* JOYSTICK */
const joy = document.getElementById("joystick");
const stick = document.getElementById("stick");

let active = false;

joy.addEventListener("touchstart", (e) => {
  e.preventDefault();
  active = true;
});

joy.addEventListener("touchend", (e) => {
  e.preventDefault();
  active = false;
  stick.style.transform = `translate(0,0)`;

  ["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].forEach((k, i) => {
    const codes = [38,40,37,39];
    release(k, codes[i]);
  });
});

joy.addEventListener("touchmove", (e) => {
  if (!active) return;

  const rect = joy.getBoundingClientRect();
  const t = e.touches[0];

  let x = t.clientX - rect.left - rect.width/2;
  let y = t.clientY - rect.top - rect.height/2;

  const max = 40;
  x = Math.max(-max, Math.min(max, x));
  y = Math.max(-max, Math.min(max, y));

  stick.style.transform = `translate(${x}px, ${y}px)`;

  release("ArrowUp", 38);
  release("ArrowDown", 40);
  release("ArrowLeft", 37);
  release("ArrowRight", 39);

  if (y < -10) press("ArrowUp", 38);
  if (y > 10) press("ArrowDown", 40);
  if (x < -10) press("ArrowLeft", 37);
  if (x > 10) press("ArrowRight", 39);
});
</script>
    <script async src="sm64.us.f3dex2e.js"></script>
  </body>
</html>
