<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Vault Premium — Library</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#05030d;--bg2:#09061a;--bg3:#0d0920;
  --gold:#f59e0b;--gold2:#fbbf24;--gold3:#fde68a;
  --purple:#7c3aed;--purple2:#9333ea;--accent:#c4b5fd;
  --green:#34d399;--red:#f43f5e;
  --text:#f0eaff;--muted:rgba(240,234,255,0.45);--dim:rgba(240,234,255,0.12);
  --border:rgba(245,158,11,0.12);--border2:rgba(245,158,11,0.25);
}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:#2d1a00;border-radius:2px;}
body::before{content:'';position:fixed;inset:0;z-index:1000;pointer-events:none;opacity:0.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}

/* LOCK SCREEN */
#lockScreen{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px;}
#lockScreen.hidden{display:none;}
.lock-box{background:linear-gradient(145deg,#0d0920,#09061a);border:1px solid var(--border2);border-radius:24px;padding:52px 44px;max-width:440px;width:100%;text-align:center;box-shadow:0 32px 80px rgba(0,0,0,0.6);}
.lock-icon{font-size:52px;margin-bottom:16px;}
.lock-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;color:#fff;margin-bottom:8px;}
.lock-title em{font-style:italic;color:var(--gold2);}
.lock-sub{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:32px;font-weight:300;}
.lock-input{width:100%;padding:14px 18px;background:rgba(255,255,255,0.04);border:1.5px solid var(--border2);border-radius:11px;color:var(--text);font-size:16px;font-family:'DM Sans',sans-serif;outline:none;text-align:center;letter-spacing:0.12em;transition:border-color 0.2s;margin-bottom:12px;}
.lock-input:focus{border-color:var(--gold);}
.lock-input::placeholder{color:var(--dim);letter-spacing:0.05em;}
.lock-input.error{border-color:var(--red);animation:shake 0.3s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
.lock-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:11px;color:#0d0900;font-size:15px;font-weight:800;font-family:'DM Sans',sans-serif;cursor:pointer;letter-spacing:0.02em;box-shadow:0 6px 24px rgba(245,158,11,0.35);transition:transform 0.15s,box-shadow 0.15s;}
.lock-btn:hover{transform:translateY(-1px);box-shadow:0 10px 36px rgba(245,158,11,0.5);}
.lock-err{font-size:12px;color:var(--red);margin-top:8px;display:none;font-family:'IBM Plex Mono',monospace;}
.lock-note{font-size:11px;color:var(--dim);margin-top:16px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.04em;}

/* HEADER */
#appHeader{position:sticky;top:0;z-index:100;background:rgba(5,3,13,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.hdr-logo{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;color:var(--gold2);}
.hdr-badge{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:3px 9px;border-radius:4px;background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.25);color:var(--gold);}
.hdr-search{flex:1;min-width:160px;max-width:340px;position:relative;}
.hdr-search input{width:100%;padding:9px 12px 9px 34px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;}
.hdr-search input:focus{border-color:var(--gold);}
.hdr-search input::placeholder{color:var(--dim);}
.hdr-search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:13px;pointer-events:none;}
.hdr-right{display:flex;gap:8px;align-items:center;margin-left:auto;}
.hdr-count{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);}
.hdr-filter{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--muted);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;}
.hdr-filter option{background:#0d0920;}
.hdr-sort{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--muted);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;}
.hdr-sort option{background:#0d0920;}
.hdr-logout{background:none;border:1px solid rgba(244,63,94,0.2);border-radius:8px;padding:7px 13px;color:rgba(244,63,94,0.6);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.15s;}
.hdr-logout:hover{background:rgba(244,63,94,0.08);color:var(--red);border-color:rgba(244,63,94,0.4);}
#syncStatus{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--green);display:flex;align-items:center;gap:5px;}
#syncStatus.syncing{color:var(--gold);}
#syncStatus.error{color:var(--red);}

/* MAIN */
#appMain{max-width:1300px;margin:0 auto;padding:24px 32px 80px;}

/* TAG FILTERS */
.tag-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:20px;}
.tag-pill{font-size:11px;font-weight:600;padding:5px 13px;border-radius:20px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all 0.15s;white-space:nowrap;}
.tag-pill:hover{border-color:var(--border2);color:var(--gold);}
.tag-pill.active{background:rgba(245,158,11,0.12);border-color:var(--border2);color:var(--gold2);}

/* SECTION HEADERS */
.sec-hdr{display:flex;align-items:center;gap:12px;margin:28px 0 16px;}
.sec-hdr-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#fff;}
.sec-hdr-count{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);}
.sec-hdr-line{flex:1;height:1px;background:var(--border);}

/* GRID */
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:32px;}
.game-card{border-radius:12px;overflow:hidden;border:1px solid rgba(245,158,11,0.08);background:var(--bg2);cursor:pointer;transition:border-color 0.18s,transform 0.18s,box-shadow 0.18s;animation:fadeUp 0.28s ease both;position:relative;}
.game-card:hover{border-color:rgba(245,158,11,0.3);transform:translateY(-4px);box-shadow:0 14px 44px rgba(245,158,11,0.1);}
.gc-cover{width:100%;aspect-ratio:3/4;overflow:hidden;background:#1a1005;position:relative;display:flex;align-items:center;justify-content:center;font-size:36px;}
.gc-cover img{width:100%;height:100%;object-fit:cover;display:block;}
.gc-cover-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,3,13,0.95) 0%,transparent 50%);opacity:0;transition:opacity 0.2s;}
.game-card:hover .gc-cover-overlay{opacity:1;}
.gc-play-hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;color:var(--gold2);background:rgba(5,3,13,0.85);padding:4px 12px;border-radius:5px;white-space:nowrap;opacity:0;transition:opacity 0.2s;font-family:'IBM Plex Mono',monospace;letter-spacing:0.05em;}
.game-card:hover .gc-play-hint{opacity:1;}
.gc-body{padding:9px 11px 11px;}
.gc-title{font-size:12px;font-weight:700;color:var(--accent);line-height:1.25;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gc-tags{font-size:9px;color:var(--dim);font-family:'IBM Plex Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* DETAIL MODAL */
#detailOverlay{position:fixed;inset:0;z-index:300;background:rgba(3,2,8,0.9);backdrop-filter:blur(20px);display:none;align-items:center;justify-content:center;padding:24px;}
#detailOverlay.open{display:flex;}
#detailBox{background:linear-gradient(145deg,#0d0920,#09061a);border:1px solid var(--border2);border-radius:22px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;animation:modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes modalIn{from{opacity:0;transform:scale(0.92) translateY(16px);}to{opacity:1;transform:scale(1) translateY(0);}}
.db-hero{display:grid;grid-template-columns:200px 1fr;gap:0;}
@media(max-width:600px){.db-hero{grid-template-columns:1fr;}}
.db-cover{border-radius:22px 0 0 0;overflow:hidden;background:#1a1005;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;font-size:44px;}
.db-cover img{width:100%;height:100%;object-fit:cover;display:block;}
.db-info{padding:28px 28px 20px;}
.db-close{float:right;background:none;border:none;color:var(--dim);cursor:pointer;font-size:20px;margin-left:8px;line-height:1;transition:color 0.15s;}
.db-close:hover{color:var(--text);}
.db-status{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.db-title{font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,34px);font-weight:900;color:#fff;line-height:1.05;margin-bottom:12px;}
.db-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
.db-tag{font-size:9px;font-weight:600;padding:3px 8px;border-radius:4px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.15);color:var(--gold);font-family:'IBM Plex Mono',monospace;}
.db-notes{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:18px;font-style:italic;}
.db-links{padding:0 28px 28px;display:flex;flex-direction:column;gap:8px;}
.db-link-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid var(--border);cursor:pointer;transition:all 0.15s;text-decoration:none;}
.db-link-row:hover{background:rgba(245,158,11,0.08);border-color:var(--border2);}
.dlr-label{font-size:13px;font-weight:700;color:var(--text);flex:1;}
.dlr-url{font-size:10px;color:var(--dim);font-family:'IBM Plex Mono',monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dlr-launch{font-size:11px;font-weight:700;padding:6px 14px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:6px;color:#0d0900;white-space:nowrap;}
.db-empty{font-size:13px;color:var(--dim);text-align:center;padding:20px;font-family:'IBM Plex Mono',monospace;}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--dim);}
.empty-state-icon{font-size:40px;margin-bottom:12px;}
.empty-state h3{font-family:'Playfair Display',serif;font-size:20px;color:var(--muted);margin-bottom:6px;}
.empty-state p{font-size:13px;line-height:1.6;}

/* TOAST */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(12px);background:#0d0920;border:1px solid var(--border2);border-radius:10px;padding:10px 20px;font-size:12px;color:var(--gold2);font-family:'IBM Plex Mono',monospace;opacity:0;transition:opacity 0.18s,transform 0.18s;z-index:999;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔐</div>
    <h1 class="lock-title">Game Vault<br><em>Premium</em></h1>
    <p class="lock-sub">Enter your subscriber password to access all 61 games. Don't have one? <a href="premium.html" style="color:var(--gold2);">Subscribe here.</a></p>
    <input type="password" id="passwordInput" class="lock-input" placeholder="Enter password" autocomplete="current-password">
    <button class="lock-btn" id="lockBtn">Unlock Library →</button>
    <div class="lock-err" id="lockErr">Incorrect password. Please try again.</div>
    <div class="lock-note">Your access is saved on this device automatically.</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <header id="appHeader">
    <div class="hdr-logo">🎮 Game Vault</div>
    <div class="hdr-badge">Premium</div>
    <div class="hdr-search">
      <span class="hdr-search-ico">🔍</span>
      <input id="searchInput" placeholder="Search games, tags...">
    </div>
    <div class="hdr-right">
      <div id="syncStatus">● Live</div>
      <div class="hdr-count" id="gameCount"></div>
      <select class="hdr-filter" id="filterTag">
        <option value="">All tags</option>
      </select>
      <select class="hdr-sort" id="sortBy">
        <option value="default">Default</option>
        <option value="az">A → Z</option>
        <option value="za">Z → A</option>
      </select>
      <button class="hdr-logout" id="logoutBtn">Sign Out</button>
    </div>
  </header>

  <div id="appMain">
    <div class="tag-row" id="tagRow"></div>
    <div id="gameContent"></div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div id="detailOverlay">
  <div id="detailBox"></div>
</div>

<div id="toast"></div>

<script>
// ── CONFIG ── Change this to your chosen password
var PASSWORDS = ['vault2024', 'gamevault', 'premium'];  // any of these work

// ── DATA SOURCE ── Points to games-data.json in same folder
var DATA_URL = 'games-data.json';

// ── SYNC INTERVAL ── Check for new games every 5 minutes
var SYNC_INTERVAL = 5 * 60 * 1000;

var games = [];
var activeTag = '';
var toastTimer;

/* ── AUTH ── */
function checkAuth() {
  var saved = localStorage.getItem('gvp-auth');
  if (saved && PASSWORDS.includes(saved)) {
    showApp();
  }
}

document.getElementById('lockBtn').addEventListener('click', tryUnlock);
document.getElementById('passwordInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') tryUnlock();
});

function tryUnlock() {
  var val = document.getElementById('passwordInput').value.trim().toLowerCase();
  if (PASSWORDS.includes(val)) {
    localStorage.setItem('gvp-auth', val);
    document.getElementById('lockScreen').classList.add('hidden');
    showApp();
  } else {
    var inp = document.getElementById('passwordInput');
    inp.classList.add('error');
    document.getElementById('lockErr').style.display = 'block';
    setTimeout(function() { inp.classList.remove('error'); }, 400);
  }
}

document.getElementById('logoutBtn').addEventListener('click', function() {
  localStorage.removeItem('gvp-auth');
  location.reload();
});

function showApp() {
  document.getElementById('lockScreen').classList.add('hidden');
  document.getElementById('app').style.display = 'block';
  loadGames();
  setInterval(loadGames, SYNC_INTERVAL);
}

/* ── DATA ── */
function loadGames() {
  var ss = document.getElementById('syncStatus');
  ss.textContent = '↻ Syncing…';
  ss.className = 'syncing';

  fetch(DATA_URL + '?t=' + Date.now())
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      games = data;
      ss.textContent = '● Live';
      ss.className = '';
      buildTagFilters();
      render();
      toast('Library synced — ' + games.length + ' games');
    })
    .catch(function(e) {
      ss.textContent = '● Offline';
      ss.className = 'error';
      // try localStorage cache
      var cached = localStorage.getItem('gvp-cache');
      if (cached) {
        try { games = JSON.parse(cached); render(); } catch(ex) {}
      }
    });
}

/* ── TAG FILTERS ── */
function buildTagFilters() {
  var tags = {};
  games.forEach(function(g) {
    (g.tags || []).forEach(function(t) {
      if (t.trim()) tags[t.trim().toLowerCase()] = (tags[t.trim().toLowerCase()] || 0) + 1;
    });
  });
  var topTags = Object.keys(tags).sort(function(a, b) { return tags[b] - tags[a]; }).slice(0, 16);

  // header filter dropdown
  var sel = document.getElementById('filterTag');
  sel.innerHTML = '<option value="">All tags</option>' +
    topTags.map(function(t) { return '<option value="' + t + '">' + t + ' (' + tags[t] + ')</option>'; }).join('');

  // tag pills
  document.getElementById('tagRow').innerHTML =
    ['All'].concat(topTags).map(function(t, i) {
      var val = i === 0 ? '' : t;
      return '<div class="tag-pill' + (activeTag === val ? ' active' : '') + '" data-tag="' + val + '">' +
        (i === 0 ? 'All Games' : t.charAt(0).toUpperCase() + t.slice(1)) + '</div>';
    }).join('');

  document.querySelectorAll('.tag-pill').forEach(function(pill) {
    pill.addEventListener('click', function() {
      activeTag = this.dataset.tag;
      document.getElementById('filterTag').value = activeTag;
      document.querySelectorAll('.tag-pill').forEach(function(p) { p.classList.remove('active'); });
      this.classList.add('active');
      render();
    });
  });
}

/* ── RENDER ── */
function render() {
  var q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  var tag = activeTag || document.getElementById('filterTag').value;
  var sort = document.getElementById('sortBy').value;
  var EMOJIS = ['🎮', '⚔️', '🏰', '🚀', '🧙', '🐉', '🌌', '🔫', '🎯', '🌊', '👾', '🦔'];

  var list = games.filter(function(g) {
    var matchQ = !q || g.title.toLowerCase().includes(q) ||
      (g.tags || []).some(function(t) { return t.toLowerCase().includes(q); }) ||
      (g.notes || '').toLowerCase().includes(q);
    var matchT = !tag || (g.tags || []).some(function(t) { return t.toLowerCase() === tag.toLowerCase(); });
    return matchQ && matchT;
  });

  if (sort === 'az') list.sort(function(a, b) { return a.title.localeCompare(b.title); });
  else if (sort === 'za') list.sort(function(a, b) { return b.title.localeCompare(a.title); });

  document.getElementById('gameCount').textContent = list.length + ' of ' + games.length + ' games';

  if (!list.length) {
    document.getElementById('gameContent').innerHTML =
      '<div class="empty-state"><div class="empty-state-icon">🔍</div>' +
      '<h3>No results</h3><p>Try a different search or tag.</p></div>';
    return;
  }

  var html = '<div class="games-grid">' +
    list.map(function(g, i) {
      var emoji = EMOJIS[i % EMOJIS.length];
      var delay = 'animation-delay:' + Math.min(i * 0.02, 0.5) + 's;';
      return '<div class="game-card" data-idx="' + games.indexOf(g) + '" style="' + delay + '">' +
        '<div class="gc-cover">' +
          (g.cover ? '<img src="' + g.cover + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">' : '') +
          (!g.cover ? emoji : '') +
          '<div class="gc-cover-overlay"></div>' +
          '<div class="gc-play-hint">▶ ' + ((g.links || []).length === 1 ? 'Play' : 'Choose Link') + '</div>' +
        '</div>' +
        '<div class="gc-body">' +
          '<div class="gc-title">' + g.title + '</div>' +
          '<div class="gc-tags">' + (g.tags || []).slice(0, 3).join(' · ') + '</div>' +
        '</div>' +
      '</div>';
    }).join('') + '</div>';

  document.getElementById('gameContent').innerHTML = html;

  document.querySelectorAll('.game-card').forEach(function(card) {
    card.addEventListener('click', function() {
      var g = games[parseInt(this.dataset.idx)];
      if (!g) return;
      var links = g.links || [];
      // single link — launch directly
      if (links.length === 1 && links[0].url) {
        window.open(links[0].url, '_blank');
        toast('Launching ' + g.title + '…');
        return;
      }
      openDetail(g);
    });
  });

  // cache for offline
  try { localStorage.setItem('gvp-cache', JSON.stringify(games)); } catch(e) {}
}

/* ── DETAIL ── */
function openDetail(g) {
  var EMOJIS = ['🎮', '⚔️', '🏰', '🚀', '🧙', '🐉'];
  var links = g.links || [];
  document.getElementById('detailBox').innerHTML =
    '<div class="db-hero">' +
      '<div class="db-cover">' +
        (g.cover ? '<img src="' + g.cover + '" alt="" onerror="this.style.display=\'none\'">' : EMOJIS[0]) +
      '</div>' +
      '<div class="db-info">' +
        '<button class="db-close" id="dbClose">✕</button>' +
        (g.status ? '<div class="db-status">' + g.status.toUpperCase() + '</div>' : '') +
        '<div class="db-title">' + g.title + '</div>' +
        '<div class="db-tags">' + (g.tags || []).map(function(t) { return '<span class="db-tag">' + t + '</span>'; }).join('') + '</div>' +
        (g.notes ? '<div class="db-notes">' + g.notes + '</div>' : '') +
      '</div>' +
    '</div>' +
    '<div class="db-links">' +
      (links.length ?
        links.map(function(l) {
          return '<a class="db-link-row" href="' + l.url + '" target="_blank" rel="noopener">' +
            '<span class="dlr-label">' + (l.label || 'Link') + '</span>' +
            '<span class="dlr-url">' + l.url + '</span>' +
            '<span class="dlr-launch">▶ Play</span>' +
          '</a>';
        }).join('') :
        '<div class="db-empty">No links available yet.</div>'
      ) +
    '</div>';

  document.getElementById('dbClose').addEventListener('click', closeDetail);
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
}

document.getElementById('detailOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeDetail();
});

/* ── CONTROLS ── */
document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('filterTag').addEventListener('change', function() {
  activeTag = this.value;
  document.querySelectorAll('.tag-pill').forEach(function(p) {
    p.classList.toggle('active', p.dataset.tag === activeTag);
  });
  render();
});
document.getElementById('sortBy').addEventListener('change', render);
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeDetail();
});

/* ── TOAST ── */
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2400);
}

// Init
checkAuth();
</script>
</body>
</html>
