<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Vault Premium — Library</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#05030d;--bg2:#09061a;--bg3:#0d0920;
  --gold:#f59e0b;--gold2:#fbbf24;--gold3:#fde68a;
  --purple:#7c3aed;--accent:#c4b5fd;
  --green:#34d399;--red:#f43f5e;--blue:#60a5fa;
  --text:#f0eaff;--muted:rgba(240,234,255,0.45);--dim:rgba(240,234,255,0.12);
  --border:rgba(245,158,11,0.12);--border2:rgba(245,158,11,0.25);
}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:#2d1a00;border-radius:2px;}
body::before{content:'';position:fixed;inset:0;z-index:1000;pointer-events:none;opacity:0.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}

/* ── LOCK SCREEN ── */
#lockScreen{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px;}
#lockScreen.gone{display:none;}
.lock-box{background:linear-gradient(145deg,#0d0920,#09061a);border:1px solid var(--border2);border-radius:24px;padding:52px 44px;max-width:420px;width:100%;text-align:center;box-shadow:0 32px 80px rgba(0,0,0,0.6);}
.lock-icon{font-size:52px;margin-bottom:16px;}
.lock-title{font-family:'Playfair Display',serif;font-size:30px;font-weight:900;color:#fff;margin-bottom:8px;}
.lock-title em{font-style:italic;color:var(--gold2);}
.lock-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:28px;font-weight:300;}
.lock-sub a{color:var(--gold2);text-decoration:none;}
.lock-input{width:100%;padding:14px 18px;background:rgba(255,255,255,0.04);border:1.5px solid var(--border2);border-radius:11px;color:var(--text);font-size:16px;font-family:'DM Sans',sans-serif;outline:none;text-align:center;letter-spacing:0.12em;transition:border-color 0.2s;margin-bottom:10px;}
.lock-input:focus{border-color:var(--gold);}
.lock-input::placeholder{color:var(--dim);letter-spacing:0.04em;}
.lock-input.err{border-color:var(--red);animation:shake 0.3s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
.lock-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:11px;color:#0d0900;font-size:15px;font-weight:800;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 6px 24px rgba(245,158,11,0.35);transition:transform 0.15s,box-shadow 0.15s;}
.lock-btn:hover{transform:translateY(-1px);box-shadow:0 10px 36px rgba(245,158,11,0.5);}
.lock-err{font-size:11px;color:var(--red);margin-top:8px;display:none;font-family:'IBM Plex Mono',monospace;}
.lock-note{font-size:10px;color:var(--dim);margin-top:14px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.04em;}

/* ── APP SHELL ── */
#app{display:none;height:100%;flex-direction:column;}
#app.show{display:flex;}

/* ── HEADER ── */
#hdr{flex-shrink:0;background:rgba(5,3,13,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:11px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.hdr-logo{font-family:'Playfair Display',serif;font-size:17px;font-weight:900;color:var(--gold2);white-space:nowrap;}
.hdr-badge{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:3px 8px;border-radius:4px;background:rgba(245,158,11,0.1);border:1px solid var(--border2);color:var(--gold);white-space:nowrap;}
.hdr-search{flex:1;min-width:140px;max-width:320px;position:relative;}
.hdr-search input{width:100%;padding:8px 12px 8px 32px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;}
.hdr-search input:focus{border-color:var(--gold);}
.hdr-search input::placeholder{color:var(--dim);}
.hdr-search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:12px;pointer-events:none;}
.hdr-right{display:flex;gap:8px;align-items:center;margin-left:auto;flex-wrap:wrap;}
#syncDot{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--green);white-space:nowrap;}
#syncDot.loading{color:var(--gold);}
#syncDot.err{color:var(--red);}
.hdr-count{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);white-space:nowrap;}
.hdr-sel{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--muted);font-size:11px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;}
.hdr-sel option{background:#0d0920;}
.hdr-logout{background:none;border:1px solid rgba(244,63,94,0.18);border-radius:7px;padding:6px 12px;color:rgba(244,63,94,0.5);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.hdr-logout:hover{background:rgba(244,63,94,0.08);color:var(--red);border-color:rgba(244,63,94,0.4);}

/* ── CATALOG ── */
#catalog{flex:1;overflow-y:auto;padding:20px 24px 120px;}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.tag-pill{font-size:10px;font-weight:600;padding:4px 11px;border-radius:16px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all 0.12s;white-space:nowrap;}
.tag-pill:hover{border-color:var(--border2);color:var(--gold);}
.tag-pill.on{background:rgba(245,158,11,0.1);border-color:var(--border2);color:var(--gold2);}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;}
.game-card{border-radius:11px;overflow:hidden;border:1px solid rgba(245,158,11,0.08);background:var(--bg2);cursor:pointer;transition:border-color 0.18s,transform 0.18s,box-shadow 0.18s;animation:fadeUp 0.25s ease both;position:relative;}
.game-card:hover{border-color:rgba(245,158,11,0.32);transform:translateY(-4px);box-shadow:0 14px 44px rgba(245,158,11,0.1);}
.gc-cover{width:100%;aspect-ratio:3/4;overflow:hidden;background:#1a1005;position:relative;display:flex;align-items:center;justify-content:center;font-size:36px;}
.gc-cover img{width:100%;height:100%;object-fit:cover;display:block;}
.gc-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(5,3,13,0.95) 0%,transparent 55%);opacity:0;transition:opacity 0.2s;display:flex;align-items:flex-end;justify-content:center;padding-bottom:12px;}
.game-card:hover .gc-overlay{opacity:1;}
.gc-play-btn{font-size:12px;font-weight:800;color:var(--gold2);background:rgba(5,3,13,0.8);border:1px solid rgba(245,158,11,0.3);padding:5px 16px;border-radius:6px;letter-spacing:0.05em;font-family:'IBM Plex Mono',monospace;}
.gc-body{padding:8px 10px 10px;}
.gc-title{font-size:11px;font-weight:700;color:var(--accent);line-height:1.25;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gc-tags{font-size:9px;color:var(--dim);font-family:'IBM Plex Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gc-new{position:absolute;top:7px;left:7px;font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:2px 7px;border-radius:3px;background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);color:var(--green);}
.empty-state{text-align:center;padding:60px 20px;color:var(--dim);}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.3;}
.empty-h{font-family:'Playfair Display',serif;font-size:20px;color:var(--muted);margin-bottom:6px;}
.empty-p{font-size:13px;color:var(--dim);line-height:1.6;}
.loading-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;}
.skel{border-radius:11px;background:var(--bg2);border:1px solid rgba(245,158,11,0.05);overflow:hidden;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.5;}50%{opacity:1;}}
.skel-art{aspect-ratio:3/4;background:rgba(245,158,11,0.04);}
.skel-body{padding:8px 10px 10px;}
.skel-line{height:10px;border-radius:4px;background:rgba(245,158,11,0.06);margin-bottom:5px;}
.skel-line.short{width:60%;}

/* ── GAME PLAYER PANEL ── */
#playerPanel{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;transform:translateY(100%);transition:transform 0.45s cubic-bezier(0.22,1,0.36,1);}
#playerPanel.open{transform:translateY(0);}
#playerBar{flex-shrink:0;background:rgba(5,3,13,0.98);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:14px;}
.pb-back{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;padding:7px 14px;color:var(--muted);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.pb-back:hover{background:rgba(244,63,94,0.08);border-color:rgba(244,63,94,0.3);color:var(--red);}
.pb-cover{width:28px;height:36px;border-radius:5px;overflow:hidden;background:#1a1005;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;}
.pb-cover img{width:100%;height:100%;object-fit:cover;display:block;}
.pb-info{flex:1;min-width:0;}
.pb-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pb-tags{font-size:10px;color:var(--dim);font-family:'IBM Plex Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pb-right{display:flex;gap:8px;align-items:center;margin-left:auto;}
.pb-btn{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:7px;padding:7px 13px;color:var(--muted);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.pb-btn:hover{background:rgba(245,158,11,0.08);border-color:var(--border2);color:var(--gold);}
.pb-btn.full{color:var(--accent);}
#playerFrame{flex:1;border:none;background:#000;display:block;width:100%;height:100%;}
#playerLoading{position:absolute;inset:0;z-index:5;background:rgba(5,3,13,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;pointer-events:none;transition:opacity 0.4s;}
#playerLoading.gone{opacity:0;}
.pl-icon{font-size:40px;animation:spin 1.5s linear infinite;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.pl-text{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:0.08em;}
.pl-game-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--gold2);}

/* ── TOAST ── */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(10px);background:#09061a;border:1px solid var(--border2);border-radius:9px;padding:9px 18px;font-size:12px;color:var(--gold2);font-family:'IBM Plex Mono',monospace;opacity:0;transition:opacity 0.18s,transform 0.18s;z-index:999;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<!-- LOCK -->
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔐</div>
    <h1 class="lock-title">Game Vault<br><em>Premium</em></h1>
    <p class="lock-sub">Enter your subscriber password to access the full library. Don't have one? <a href="../">Subscribe here.</a></p>
    <input type="password" id="pwInput" class="lock-input" placeholder="Enter password" autocomplete="current-password">
    <button class="lock-btn" id="lockBtn">Unlock Library →</button>
    <div class="lock-err" id="lockErr">Incorrect password. Try again.</div>
    <div class="lock-note">Stays logged in on this device automatically.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header id="hdr">
    <div class="hdr-logo">🎮 Game Vault</div>
    <div class="hdr-badge">Premium</div>
    <div class="hdr-search">
      <span class="hdr-search-ico">🔍</span>
      <input id="searchInput" placeholder="Search games, tags...">
    </div>
    <div class="hdr-right">
      <span id="syncDot">● Live</span>
      <span class="hdr-count" id="gameCount"></span>
      <select class="hdr-sel" id="sortSel">
        <option value="default">Default</option>
        <option value="az">A → Z</option>
        <option value="za">Z → A</option>
        <option value="newest">Newest first</option>
      </select>
      <button class="hdr-logout" id="logoutBtn">Sign Out</button>
    </div>
  </header>

  <div id="catalog">
    <div class="tag-row" id="tagRow"></div>
    <div id="gameContent"></div>
  </div>
</div>

<!-- PLAYER PANEL -->
<div id="playerPanel">
  <div id="playerBar">
    <button class="pb-back" id="pbBack">✕ Back to Library</button>
    <div class="pb-cover" id="pbCover">🎮</div>
    <div class="pb-info">
      <div class="pb-title" id="pbTitle"></div>
      <div class="pb-tags" id="pbTags"></div>
    </div>
    <div class="pb-right">
      <button class="pb-btn full" id="pbFullscreen">⛶ Fullscreen</button>
    </div>
  </div>
  <div style="position:relative;flex:1;display:flex;flex-direction:column;">
    <div id="playerLoading">
      <div class="pl-icon">⚙️</div>
      <div class="pl-game-name" id="plGameName"></div>
      <div class="pl-text">Loading game…</div>
    </div>
    <iframe id="playerFrame" allowfullscreen allow="autoplay; fullscreen *; pointer-lock *" sandbox="allow-scripts allow-same-origin allow-pointer-lock allow-popups allow-forms"></iframe>
  </div>
</div>

<div id="toast"></div>

<script>
/* ── CONFIG ── */
// Add/remove passwords here. Give each subscriber one.
var PASSWORDS = ['vault2024', 'premium', 'gamevault'];

/* ── PATHS ── */
// All relative to library/index.html
var INDEX_URL   = './games-index.json';   // game list
var GAMES_BASE  = './games/';             // game folders
var SYNC_MS     = 5 * 60 * 1000;         // re-fetch every 5min

/* ── STATE ── */
var games = [];
var activeTag = '';
var toastTimer;

/* ── AUTH ── */
(function(){
  var saved = localStorage.getItem('gvp-pw');
  if(saved && PASSWORDS.indexOf(saved) >= 0){
    unlock(false);
  }
})();

document.getElementById('lockBtn').addEventListener('click', tryUnlock);
document.getElementById('pwInput').addEventListener('keydown', function(e){if(e.key==='Enter')tryUnlock();});

function tryUnlock(){
  var v = document.getElementById('pwInput').value.trim().toLowerCase();
  if(PASSWORDS.indexOf(v) >= 0){
    localStorage.setItem('gvp-pw', v);
    unlock(true);
  } else {
    var inp = document.getElementById('pwInput');
    inp.classList.add('err');
    document.getElementById('lockErr').style.display = 'block';
    setTimeout(function(){ inp.classList.remove('err'); }, 400);
  }
}

function unlock(animate){
  document.getElementById('lockScreen').classList.add('gone');
  document.getElementById('app').classList.add('show');
  fetchGames();
  setInterval(fetchGames, SYNC_MS);
}

document.getElementById('logoutBtn').addEventListener('click', function(){
  localStorage.removeItem('gvp-pw');
  location.reload();
});

/* ── DATA ── */
function fetchGames(){
  var dot = document.getElementById('syncDot');
  dot.textContent = '↻ Syncing…'; dot.className = 'loading';
  showSkeletons();

  fetch(INDEX_URL + '?t=' + Date.now())
    .then(function(r){ if(!r.ok)throw new Error(r.status); return r.json(); })
    .then(function(idx){
      var slugs = idx.games || [];
      var promises = slugs.map(function(slug){
        return fetch(GAMES_BASE + slug + '/data.json?t=' + Date.now())
          .then(function(r){ return r.ok ? r.json() : null; })
          .then(function(d){ if(d){ d._slug = slug; return d; } return null; })
          .catch(function(){ return null; });
      });
      return Promise.all(promises);
    })
    .then(function(results){
      games = results.filter(Boolean);
      // cache for offline
      try{ localStorage.setItem('gvp-cache', JSON.stringify(games)); }catch(e){}
      dot.textContent = '● Live'; dot.className = '';
      buildTags();
      render();
    })
    .catch(function(){
      dot.textContent = '● Offline'; dot.className = 'err';
      var cached = localStorage.getItem('gvp-cache');
      if(cached){ try{ games = JSON.parse(cached); buildTags(); render(); }catch(e){} }
      else{ document.getElementById('gameContent').innerHTML = '<div class="empty-state"><div class="empty-icon">📡</div><h3 class="empty-h">Couldn\'t reach server</h3><p class="empty-p">Check your connection and refresh.</p></div>'; }
    });
}

function showSkeletons(){
  var html = '<div class="loading-grid">' +
    Array(12).fill(0).map(function(){
      return '<div class="skel"><div class="skel-art"></div><div class="skel-body"><div class="skel-line"></div><div class="skel-line short"></div></div></div>';
    }).join('') + '</div>';
  document.getElementById('gameContent').innerHTML = html;
}

/* ── TAGS ── */
function buildTags(){
  var counts = {};
  games.forEach(function(g){
    (g.tags||[]).forEach(function(t){
      var k = t.toLowerCase().trim();
      if(k) counts[k] = (counts[k]||0)+1;
    });
  });
  var top = Object.keys(counts).sort(function(a,b){return counts[b]-counts[a];}).slice(0,14);
  document.getElementById('tagRow').innerHTML =
    [''].concat(top).map(function(t){
      return '<div class="tag-pill'+(activeTag===t?' on':'')+'" data-tag="'+t+'">'+(t===''?'All':t.charAt(0).toUpperCase()+t.slice(1))+'</div>';
    }).join('');
  document.querySelectorAll('.tag-pill').forEach(function(p){
    p.addEventListener('click',function(){
      activeTag=this.dataset.tag;
      document.querySelectorAll('.tag-pill').forEach(function(x){x.classList.remove('on');});
      this.classList.add('on');
      render();
    });
  });
}

/* ── RENDER ── */
function render(){
  var q = (document.getElementById('searchInput').value||'').toLowerCase().trim();
  var sort = document.getElementById('sortSel').value;
  var EMOJIS = ['🎮','⚔️','🏰','🚀','🧙','🐉','🌌','🔫','🎯','🌊','👾','🦔'];

  var list = games.filter(function(g){
    var mQ = !q || g.title.toLowerCase().includes(q) ||
      (g.tags||[]).some(function(t){return t.toLowerCase().includes(q);}) ||
      (g.notes||'').toLowerCase().includes(q) ||
      (g.genre||'').toLowerCase().includes(q);
    var mT = !activeTag || (g.tags||[]).some(function(t){return t.toLowerCase()===activeTag;});
    return mQ && mT;
  });

  if(sort==='az') list.sort(function(a,b){return a.title.localeCompare(b.title);});
  else if(sort==='za') list.sort(function(a,b){return b.title.localeCompare(a.title);});
  else if(sort==='newest') list.sort(function(a,b){return (b.added||'').localeCompare(a.added||'');});

  document.getElementById('gameCount').textContent = list.length+' of '+games.length+' games';

  if(!list.length){
    document.getElementById('gameContent').innerHTML =
      '<div class="empty-state"><div class="empty-icon">🔍</div><h3 class="empty-h">No results</h3><p class="empty-p">Try a different search or tag filter.</p></div>';
    return;
  }

  var todayStr = new Date().toISOString().slice(0,10);
  document.getElementById('gameContent').innerHTML =
    '<div class="games-grid">'+
    list.map(function(g,i){
      var emoji = EMOJIS[i%EMOJIS.length];
      var delay = 'animation-delay:'+Math.min(i*0.018,0.5)+'s;';
      var isNew = g.added && g.added > new Date(Date.now()-7*864e5).toISOString().slice(0,10);
      return '<div class="game-card" data-slug="'+esc(g._slug)+'" style="'+delay+'">'+
        (isNew?'<div class="gc-new">NEW</div>':'')+
        '<div class="gc-cover">'+
          (g.cover?'<img src="'+esc(g.cover)+'" alt="" loading="lazy" onerror="this.parentElement.innerHTML=\''+emoji+'\'">':emoji)+
          '<div class="gc-overlay"><div class="gc-play-btn">▶ PLAY</div></div>'+
        '</div>'+
        '<div class="gc-body">'+
          '<div class="gc-title">'+esc(g.title)+'</div>'+
          '<div class="gc-tags">'+(g.tags||[]).slice(0,3).join(' · ')+'</div>'+
        '</div>'+
      '</div>';
    }).join('')+
    '</div>';

  document.querySelectorAll('.game-card').forEach(function(card){
    card.addEventListener('click',function(){ openGame(this.dataset.slug); });
  });
}

/* ── PLAYER ── */
function openGame(slug){
  var g = games.find(function(x){return x._slug===slug;});
  if(!g) return;

  // populate bar
  document.getElementById('pbTitle').textContent = g.title;
  document.getElementById('pbTags').textContent = (g.tags||[]).join(' · ');
  document.getElementById('plGameName').textContent = g.title;

  var pbCover = document.getElementById('pbCover');
  if(g.cover){
    pbCover.innerHTML = '<img src="'+esc(g.cover)+'" alt="" onerror="this.style.display=\'none\'">';
  } else {
    pbCover.textContent = '🎮';
  }

  // show loading, clear old frame
  var frame = document.getElementById('playerFrame');
  var loading = document.getElementById('playerLoading');
  frame.src = 'about:blank';
  loading.classList.remove('gone');

  // slide panel up
  document.getElementById('playerPanel').classList.add('open');
  document.body.style.overflow = 'hidden';

  // small delay then load game — gives panel time to animate in
  setTimeout(function(){
    frame.src = GAMES_BASE + slug + '/';
    frame.onload = function(){
      loading.classList.add('gone');
    };
  }, 300);

  toast('Loading '+g.title+'…');
}

document.getElementById('pbBack').addEventListener('click', closePlayer);

function closePlayer(){
  document.getElementById('playerPanel').classList.remove('open');
  document.getElementById('playerFrame').src = 'about:blank';
  document.getElementById('playerLoading').classList.remove('gone');
  document.body.style.overflow = '';
}

document.getElementById('pbFullscreen').addEventListener('click',function(){
  var frame = document.getElementById('playerFrame');
  if(frame.requestFullscreen) frame.requestFullscreen();
  else if(frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
});

/* ── CONTROLS ── */
document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('sortSel').addEventListener('change', render);
document.addEventListener('keydown',function(e){
  if(e.key==='Escape' && document.getElementById('playerPanel').classList.contains('open')) closePlayer();
});

/* ── HELPERS ── */
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){el.classList.remove('show');},2400);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
