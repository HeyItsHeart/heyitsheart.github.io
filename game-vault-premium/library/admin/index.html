<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Vault — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900&family=DM+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#05030d;--bg2:#09061a;--bg3:#0d0920;
  --gold:#f59e0b;--gold2:#fbbf24;--purple:#7c3aed;--accent:#c4b5fd;
  --green:#34d399;--red:#f43f5e;--blue:#60a5fa;
  --text:#f0eaff;--muted:rgba(240,234,255,0.45);--dim:rgba(240,234,255,0.12);
  --border:rgba(245,158,11,0.12);--border2:rgba(245,158,11,0.25);
}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:#2d1a00;border-radius:2px;}

/* HEADER */
.adm-hdr{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.adm-logo{font-family:'Playfair Display',serif;font-size:17px;font-weight:900;color:var(--gold2);}
.adm-badge{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;padding:3px 8px;border-radius:4px;background:rgba(245,158,11,0.1);border:1px solid var(--border2);color:var(--gold);}
.adm-hdr-right{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;}
.btn{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0d0900;border:none;box-shadow:0 4px 16px rgba(245,158,11,0.25);}
.btn-gold:hover{opacity:0.9;transform:translateY(-1px);}
.btn-green{background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.22);color:var(--green);}
.btn-green:hover{background:rgba(52,211,153,0.18);}
.btn-blue{background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.2);color:var(--blue);}
.btn-blue:hover{background:rgba(96,165,250,0.18);}
.btn-red{background:rgba(244,63,94,0.1);border:1px solid rgba(244,63,94,0.18);color:var(--red);}
.btn-red:hover{background:rgba(244,63,94,0.18);}
.btn-ghost{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--border2);color:var(--gold);}

/* LAYOUT */
.adm-body{flex:1;display:grid;grid-template-columns:300px 1fr;overflow:hidden;}
@media(max-width:800px){.adm-body{grid-template-columns:1fr;}

/* GAME LIST */
.panel-left{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.pl-toolbar{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;gap:7px;align-items:center;}
.pl-search{flex:1;padding:8px 10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;}
.pl-search:focus{border-color:var(--gold);}
.pl-search::placeholder{color:var(--dim);}
.pl-count{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim);padding:4px 8px;white-space:nowrap;}
.pl-list{flex:1;overflow-y:auto;padding:8px;}
.pl-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,0.02);border:1px solid transparent;cursor:pointer;transition:all 0.12s;margin-bottom:3px;}
.pl-item:hover{background:rgba(245,158,11,0.04);border-color:var(--border);}
.pl-item.active{background:rgba(245,158,11,0.08);border-color:var(--border2);}
.pl-thumb{width:28px;height:36px;border-radius:4px;overflow:hidden;flex-shrink:0;background:#1a1005;display:flex;align-items:center;justify-content:center;font-size:14px;}
.pl-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.pl-name{flex:1;font-size:11px;font-weight:600;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pl-slug{font-size:9px;color:var(--dim);font-family:'IBM Plex Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pl-del{background:none;border:none;color:rgba(244,63,94,0.25);cursor:pointer;font-size:12px;transition:color 0.12s;padding:2px 4px;flex-shrink:0;}
.pl-del:hover{color:var(--red);}

/* EDIT PANEL */
.panel-right{overflow-y:auto;padding:20px 24px;}
.edit-empty{text-align:center;padding:70px 20px;color:var(--dim);}
.edit-empty-icon{font-size:40px;margin-bottom:12px;opacity:0.3;}
.edit-empty-h{font-family:'Playfair Display',serif;font-size:20px;color:var(--muted);margin-bottom:6px;}
.edit-empty-p{font-size:13px;color:var(--dim);line-height:1.6;}

.form-block{margin-bottom:18px;}
.form-block-title{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.fg{margin-bottom:10px;}
.fg label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:4px;font-family:'IBM Plex Mono',monospace;}
.finput{width:100%;padding:8px 11px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;}
.finput:focus{border-color:var(--gold);}
.finput::placeholder{color:var(--dim);}
textarea.finput{resize:vertical;min-height:50px;line-height:1.55;}
.cover-row{display:flex;gap:10px;align-items:flex-start;}
.cover-prev{width:56px;height:72px;border-radius:7px;overflow:hidden;background:#1a1005;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid var(--border);}
.cover-prev img{width:100%;height:100%;object-fit:cover;}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.toggle-row{display:flex;align-items:center;gap:10px;}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.toggle-slider{position:absolute;inset:0;background:rgba(255,255,255,0.08);border-radius:20px;cursor:pointer;transition:background 0.2s;}
.toggle input:checked+.toggle-slider{background:var(--gold);}
.toggle-slider::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform 0.2s;}
.toggle input:checked+.toggle-slider::before{transform:translateX(16px);}
.toggle-label{font-size:12px;color:var(--muted);}
.edit-actions{display:flex;gap:8px;padding-top:14px;border-top:1px solid var(--border);margin-top:4px;}
.edit-actions .btn{flex:1;}

/* EXPORT GUIDE */
.export-guide{background:rgba(245,158,11,0.04);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:16px;}
.eg-title{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.eg-step{font-size:12px;color:var(--muted);margin-bottom:5px;display:flex;gap:8px;line-height:1.5;}
.eg-num{color:var(--gold2);font-family:'IBM Plex Mono',monospace;font-weight:700;flex-shrink:0;}
.eg-code{font-family:'IBM Plex Mono',monospace;font-size:11px;background:rgba(0,0,0,0.3);border-radius:4px;padding:1px 6px;color:var(--gold3);}

/* TOAST */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(10px);background:#09061a;border:1px solid var(--border2);border-radius:9px;padding:8px 16px;font-size:12px;color:var(--gold2);font-family:'IBM Plex Mono',monospace;opacity:0;transition:opacity 0.18s,transform 0.18s;z-index:999;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="adm-hdr">
  <div class="adm-logo">🎮 Game Vault</div>
  <div class="adm-badge">Admin</div>
  <a href="../" class="btn btn-ghost" style="text-decoration:none;">← Library</a>
  <div class="adm-hdr-right">
    <button class="btn btn-green" id="btnImport">📥 Import Vault JSON</button>
    <button class="btn btn-blue" id="btnAddGame">+ Add Game</button>
    <button class="btn btn-gold" id="btnExportIndex">💾 Export games-index.json</button>
  </div>
</div>

<div class="adm-body">
  <!-- LEFT -->
  <div class="panel-left">
    <div class="pl-toolbar">
      <input class="pl-search" id="listSearch" placeholder="🔍 Filter...">
      <div class="pl-count" id="plCount"></div>
    </div>
    <div class="pl-list" id="plList"></div>
  </div>

  <!-- RIGHT -->
  <div class="panel-right" id="editPanel">
    <div class="edit-empty">
      <div class="edit-empty-icon">🎮</div>
      <h3 class="edit-empty-h">Select a game to edit</h3>
      <p class="edit-empty-p">Pick a game from the left panel, or click + Add Game to create a new one.<br><br>Each game needs a folder at <span style="color:var(--gold2);font-family:'IBM Plex Mono',monospace;">games/[slug]/</span> containing <span style="color:var(--gold2);font-family:'IBM Plex Mono',monospace;">data.json</span> and your Unity build files.</p>
    </div>
  </div>
</div>

<input type="file" id="vaultImport" accept=".json" style="display:none">
<div id="toast"></div>

<script>
/* ── STATE ── */
var games = [];
var editIdx = null;
var toastTimer;

/* ── PERSIST ── */
function save(){ try{localStorage.setItem('gvp-admin-games', JSON.stringify(games));}catch(e){} }
function load(){ try{var d=localStorage.getItem('gvp-admin-games');if(d)games=JSON.parse(d);}catch(e){} }

function toast(msg,type){
  var el=document.getElementById('toast');
  el.textContent=msg;
  el.style.color=type==='err'?'#f43f5e':type==='ok'?'#34d399':'#fbbf24';
  el.classList.add('show');clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){el.classList.remove('show');},2500);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function slugify(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}

/* ── LIST ── */
function renderList(){
  var q=(document.getElementById('listSearch').value||'').toLowerCase();
  var filtered=games.map(function(g,i){g.__i=i;return g;}).filter(function(g){return !q||g.title.toLowerCase().includes(q)||(g.slug||'').includes(q);});
  document.getElementById('plCount').textContent=filtered.length+'/'+games.length;
  var EMOJIS=['🎮','⚔️','🏰','🚀','🧙','🐉','👾','🎯'];
  document.getElementById('plList').innerHTML=filtered.map(function(g){
    var i=g.__i;
    return '<div class="pl-item'+(editIdx===i?' active':'')+'" data-i="'+i+'">'+
      '<div class="pl-thumb">'+(g.cover?'<img src="'+esc(g.cover)+'" onerror="this.style.display=\'none\'">':EMOJIS[i%EMOJIS.length])+'</div>'+
      '<div style="flex:1;min-width:0;"><div class="pl-name">'+esc(g.title)+'</div><div class="pl-slug">'+(g.slug||'no-slug')+'</div></div>'+
      '<button class="pl-del" data-del="'+i+'">✕</button>'+
    '</div>';
  }).join('');

  document.querySelectorAll('.pl-item').forEach(function(el){
    el.addEventListener('click',function(e){if(e.target.closest('[data-del]'))return;editIdx=parseInt(this.dataset.i);renderList();renderEdit();});
  });
  document.querySelectorAll('[data-del]').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      var i=parseInt(this.dataset.del);
      if(!confirm('Delete "'+games[i].title+'"?'))return;
      games.splice(i,1);
      if(editIdx===i){editIdx=null;showEmptyEdit();}
      else if(editIdx!==null&&editIdx>i)editIdx--;
      save();renderList();toast('Deleted','err');
    });
  });
}

function showEmptyEdit(){
  document.getElementById('editPanel').innerHTML=
    '<div class="edit-empty"><div class="edit-empty-icon">🎮</div><h3 class="edit-empty-h">Select a game</h3></div>';
}

/* ── EDIT FORM ── */
function renderEdit(){
  if(editIdx===null){showEmptyEdit();return;}
  var g=games[editIdx];
  document.getElementById('editPanel').innerHTML=
    '<div class="form-block">'+
      '<div class="form-block-title">Identity</div>'+
      '<div class="fg"><label>Title</label><input class="finput" id="eTitle" value="'+esc(g.title||'')+'" placeholder="Game title"></div>'+
      '<div class="fg"><label>Slug <span style="color:var(--dim);font-weight:300">(folder name — no spaces)</span></label><input class="finput" id="eSlug" value="'+esc(g.slug||'')+'" placeholder="e.g. hollow-knight"></div>'+
      '<div class="fg"><label>Cover Art URL</label>'+
        '<div class="cover-row">'+
          '<div class="cover-prev" id="coverPrev">'+(g.cover?'<img src="'+esc(g.cover)+'" onerror="this.innerHTML=\'🎮\'">':'🎮')+'</div>'+
          '<input class="finput" id="eCover" value="'+esc(g.cover||'')+'" placeholder="https://..." style="flex:1;">'+
        '</div>'+
      '</div>'+
    '</div>'+

    '<div class="form-block">'+
      '<div class="form-block-title">Metadata</div>'+
      '<div class="form-row2">'+
        '<div class="fg"><label>Genre</label><input class="finput" id="eGenre" value="'+esc(g.genre||'')+'" placeholder="e.g. Action Platformer"></div>'+
        '<div class="fg"><label>Date Added</label><input class="finput" id="eAdded" value="'+esc(g.added||new Date().toISOString().slice(0,10))+'" placeholder="YYYY-MM-DD"></div>'+
      '</div>'+
      '<div class="fg"><label>Tags (comma separated)</label><input class="finput" id="eTags" value="'+esc((g.tags||[]).join(', '))+'" placeholder="indie, platformer, horror"></div>'+
      '<div class="fg"><label>Player notes / controls</label><textarea class="finput" id="eNotes" placeholder="Controls, tips, version info…">'+esc(g.notes||'')+'</textarea></div>'+
      '<div class="toggle-row">'+
        '<label class="toggle"><input type="checkbox" id="eFeatured"'+(g.featured?' checked':'')+'><div class="toggle-slider"></div></label>'+
        '<span class="toggle-label">Featured game (shown first)</span>'+
      '</div>'+
    '</div>'+

    '<div class="edit-actions">'+
      '<button class="btn btn-red" id="eDiscard">Discard</button>'+
      '<button class="btn btn-ghost" id="eExportData">Export data.json</button>'+
      '<button class="btn btn-gold" id="eSave" style="flex:2;">Save</button>'+
    '</div>'+

    '<div class="export-guide">'+
      '<div class="eg-title">📁 Where this file goes</div>'+
      '<div class="eg-step"><span class="eg-num">1.</span>Click <strong>Export data.json</strong> above</div>'+
      '<div class="eg-step"><span class="eg-num">2.</span>Upload it to <span class="eg-code">games/'+(g.slug||'[slug]')+'/data.json</span> in your repo</div>'+
      '<div class="eg-step"><span class="eg-num">3.</span>Put your Unity build files in the same folder: <span class="eg-code">Build/</span> <span class="eg-code">StreamingAssets/</span> <span class="eg-code">TemplateData/</span> <span class="eg-code">index.html</span></div>'+
      '<div class="eg-step"><span class="eg-num">4.</span>Export <strong>games-index.json</strong> (top right) and upload to <span class="eg-code">library/games-index.json</span></div>'+
    '</div>';

  // cover preview live update
  document.getElementById('eCover').addEventListener('input',function(){
    var url=this.value.trim();
    document.getElementById('coverPrev').innerHTML=url?'<img src="'+esc(url)+'" onerror="this.innerHTML=\'🎮\'">':'🎮';
  });

  // slug auto-fill from title
  document.getElementById('eTitle').addEventListener('input',function(){
    var slugEl=document.getElementById('eSlug');
    if(!slugEl.dataset.manual)slugEl.value=slugify(this.value);
  });
  document.getElementById('eSlug').addEventListener('input',function(){this.dataset.manual='1';});

  document.getElementById('eSave').addEventListener('click',function(){
    var updated=collectForm();
    games[editIdx]=updated;
    save();renderList();
    toast('Saved!','ok');
  });

  document.getElementById('eDiscard').addEventListener('click',function(){
    editIdx=null;showEmptyEdit();renderList();
  });

  document.getElementById('eExportData').addEventListener('click',function(){
    var updated=collectForm();
    games[editIdx]=updated;save();renderList();
    var out={title:updated.title,slug:updated.slug,cover:updated.cover,tags:updated.tags,notes:updated.notes,genre:updated.genre,added:updated.added,featured:updated.featured};
    dlJson(JSON.stringify(out,null,2),'data.json');
    toast('Exported data.json for '+updated.title,'ok');
  });
}

function collectForm(){
  return {
    title: document.getElementById('eTitle').value.trim()||'Untitled',
    slug:  document.getElementById('eSlug').value.trim()||slugify(document.getElementById('eTitle').value||'untitled'),
    cover: document.getElementById('eCover').value.trim(),
    genre: document.getElementById('eGenre').value.trim(),
    added: document.getElementById('eAdded').value.trim()||new Date().toISOString().slice(0,10),
    tags:  document.getElementById('eTags').value.split(',').map(function(t){return t.trim();}).filter(Boolean),
    notes: document.getElementById('eNotes').value.trim(),
    featured: document.getElementById('eFeatured').checked
  };
}

/* ── ADD GAME ── */
document.getElementById('btnAddGame').addEventListener('click',function(){
  games.push({title:'New Game',slug:'new-game',cover:'',genre:'',added:new Date().toISOString().slice(0,10),tags:[],notes:'',featured:false});
  editIdx=games.length-1;
  save();renderList();renderEdit();
  setTimeout(function(){var t=document.getElementById('eTitle');if(t){t.focus();t.select();}},60);
});

/* ── IMPORT FROM VAULT JSON ── */
document.getElementById('btnImport').addEventListener('click',function(){document.getElementById('vaultImport').click();});
document.getElementById('vaultImport').addEventListener('change',function(){
  var file=this.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!Array.isArray(data))throw new Error('Expected array');
      var added=0,updated=0;
      data.forEach(function(g){
        if(!g.title)return;
        var slug=slugify(g.title);
        var existing=games.findIndex(function(x){return x.slug===slug||x.title.toLowerCase()===g.title.toLowerCase();});
        var entry={
          title:g.title,slug:slug,
          cover:g.cover||'',genre:'',
          added:new Date().toISOString().slice(0,10),
          tags:g.tags||[],notes:g.notes||'',featured:false
        };
        if(existing>=0){games[existing]=Object.assign(games[existing],entry);updated++;}
        else{games.push(entry);added++;}
      });
      save();renderList();
      toast('Imported — '+added+' new, '+updated+' updated','ok');
    }catch(err){toast('Import failed: '+err.message,'err');}
  };
  reader.readAsText(file);
  this.value='';
});

/* ── EXPORT INDEX ── */
document.getElementById('btnExportIndex').addEventListener('click',function(){
  var idx={updated:new Date().toISOString().slice(0,10),games:games.map(function(g){return g.slug;}).filter(Boolean)};
  dlJson(JSON.stringify(idx,null,2),'games-index.json');
  toast('Exported games-index.json — upload to library/','ok');
});

/* ── SEARCH ── */
document.getElementById('listSearch').addEventListener('input',renderList);

/* ── HELPERS ── */
function dlJson(content,filename){
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:'application/json'}));
  a.download=filename;a.click();URL.revokeObjectURL(a.href);
}

load();renderList();
</script>
</body>
</html>
