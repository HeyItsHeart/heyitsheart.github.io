<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
        }

        .glass-header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);

            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
        }

        .archive-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(59, 130, 246, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(4px);
        }

        .archive-card:hover {
            transform: translateY(-4px);
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(59, 130, 246, 0.1);
        }

        .search-input {
            background: rgba(15, 23, 42, 0.6);

            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .search-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.2s linear infinite;
        }

        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .custom-scrollbar::-webkit-scrollbar {

            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #1e40af;
            border-radius: 10px;
        }
    </style>
</head>
<body class="custom-scrollbar antialiased">

    <!-- Sticky Navigation -->
    <nav class="glass-header sticky top-0 z-50 py-4 px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center font-bold text-white shadow-lg shadow-blue-900/20">
                    A
                </div>
                <h1 class="text-xl font-semibold tracking-tight">The Archive</h1>
            </div>

            
            <div class="relative w-full md:w-96">
                <input 
                    type="text" 
                    id="searchBar"
                    placeholder="Filter records..." 
                    class="search-input w-full pl-4 pr-10 py-2 rounded-lg text-sm focus:outline-none transition-all placeholder-slate-500"
                >
                <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-500">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        

        <!-- Status / Loading -->
        <div id="statusContainer" class="flex flex-col items-center justify-center py-24 text-center">
            <div id="spinner" class="loader ease-linear rounded-full border-2 border-slate-700 h-10 w-10 mb-6"></div>
            <h2 id="statusTitle" class="text-xl font-medium text-slate-300">Synchronizing Archive...</h2>
            <p id="statusSub" class="text-slate-500 text-sm mt-2 max-w-xs">Ensure links.json is present in the root directory.</p>
        </div>

        <!-- Links Grid -->
        <div id="linksGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 hidden">
            <!-- Dynamic Content -->
        </div>
    </main>

    <script>
        let archiveData = [];

        /**
         * Formats URL into a readable title
         */

        function formatTitle(url) {
            try {
                const domain = new URL(url).hostname.replace('www.', '');
                return domain.charAt(0).toUpperCase() + domain.slice(1);
            } catch {
                return "Unknown Record";
            }
        }

        /**
         * Renders the grid
         */
        function renderArchive(items) {
            const grid = document.getElementById('linksGrid');
            const status = document.getElementById('statusContainer');
            
            if (items.length === 0 && archiveData.length > 0) {
                // Search returned nothing
                grid.classList.add('hidden');

                status.classList.remove('hidden');
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('statusTitle').innerText = "No matches found";
                document.getElementById('statusSub').innerText = "Try a different search term.";
                return;
            }

            if (items.length === 0) {
                grid.classList.add('hidden');
                status.classList.remove('hidden');
                return;
            }

            status.classList.add('hidden');
            grid.classList.remove('hidden');
            grid.innerHTML = '';

            items.forEach(url => {
                const title = formatTitle(url);

                const card = document.createElement('div');
                card.className = 'archive-card p-5 rounded-xl flex flex-col h-full';
                
                card.innerHTML = `
                    <div class="flex-grow">
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-[10px] font-bold text-blue-500 uppercase tracking-widest bg-blue-500/10 px-2 py-1 rounded">Stored</span>
                        </div>
                        <h3 class="text-lg font-semibold text-slate-100 mb-1 truncate">${title}</h3>
                        <p class="text-xs text-slate-500 break-all line-clamp-1 mb-4">${url}</p>
                    </div>
                    <div class="mt-4 pt-4 border-t border-slate-700/50">
                        <a href="${url}" target="_blank" class="flex items-center justify-between group text-sm font-medium text-blue-400 hover:text-blue-300 transition-colors">
                            <span>Open Link</span>
                            <svg class="w-4 h-4 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
                            </svg>
                        </a>
                    </div>

                `;
                grid.appendChild(card);
            });
        }

        /**
         * Loads data from external JSON
         */
        async function fetchArchive() {
            try {
                // Fetching from the root links.json
                const response = await fetch('links.json');
                if (!response.ok) throw new Error('Data stream unavailable');
                
                const data = await response.json();
                archiveData = Array.isArray(data) ? data : (data.links || []);
                
                if (archiveData.length === 0) {
                    throw new Error('Archive is empty');

                }
                
                renderArchive(archiveData);
            } catch (err) {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('statusTitle').innerText = "Empty Archive";
                document.getElementById('statusSub').innerText = "Waiting for data from links.json...";
            }
        }

        // Filter functionality
        document.getElementById('searchBar').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = archiveData.filter(url => 
                url.toLowerCase().includes(term) || 
                formatTitle(url).toLowerCase().includes(term)
            );
            renderArchive(filtered);
        });


        window.addEventListener('DOMContentLoaded', fetchArchive);
    </script>
</body>
</html>
